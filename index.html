<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gigantic Zaura Maze</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #f00; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #status { font-size: 32px; font-weight: bold; text-shadow: 2px 2px #000; }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="start-screen" onclick="this.style.display='none'; gameActive=true;">
        <h1 style="font-size: 50px; color: white;">THE INFINITE MAZE</h1>
        <p style="color: #666;">CLICK TO START | USE <b>WASD</b> TO MOVE</p>
    </div>

    <div id="ui"><div id="status"></div></div>
    <canvas id="mazeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let gameActive = false;
        const GRID_SIZE = 101; // Massive maze size
        const TILE_SIZE = 80;
        
        let maze = [];
        const player = { x: 1.5, y: 1.5, speed: 0.18 };
        const monster = { 
            x: GRID_SIZE - 2.5, y: GRID_SIZE - 2.5, 
            speed: 0.13, state: 'WANDERING', timer: 0,
            targetX: 0, targetY: 0
        };

        const monsterImg = new Image();
        monsterImg.src = 'https://ibb.co';

        function generateMaze() {
            for (let y = 0; y < GRID_SIZE; y++) maze[y] = Array(GRID_SIZE).fill(1);
            function walk(x, y) {
                maze[y][x] = 0;
                const neighbors = [[x, y - 2], [x, y + 2], [x - 2, y], [x + 2, y]].sort(() => Math.random() - 0.5);
                for (const [nx, ny] of neighbors) {
                    if (nx > 0 && nx < GRID_SIZE - 1 && ny > 0 && ny < GRID_SIZE - 1 && maze[ny][nx] === 1) {
                        maze[ny + (y - ny) / 2][nx + (x - nx) / 2] = 0;
                        walk(nx, ny);
                    }
                }
            }
            walk(1, 1);
            maze[GRID_SIZE - 2][GRID_SIZE - 1] = 2; // Exit
        }
        generateMaze();

        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function isColliding(nx, ny) {
            const b = 0.25;
            const pts = [{x:nx-b, y:ny-b}, {x:nx+b, y:ny-b}, {x:nx-b, y:ny+b}, {x:nx+b, y:ny+b}];
            return pts.some(p => maze[Math.floor(p.y)][Math.floor(p.x)] === 1);
        }

        function update() {
            if (!gameActive) return;

            // Player Movement (WASD)
            if (keys['w'] && !isColliding(player.x, player.y - player.speed)) player.y -= player.speed;
            if (keys['s'] && !isColliding(player.x, player.y + player.speed)) player.y += player.speed;
            if (keys['a'] && !isColliding(player.x - player.speed, player.y)) player.x -= player.speed;
            if (keys['d'] && !isColliding(player.x + player.speed, player.y)) player.x += player.speed;

            // Monster AI Logic
            const dist = Math.hypot(monster.x - player.x, monster.y - player.y);
            const now = Date.now();

            if (monster.state === 'WANDERING') {
                statusEl.innerText = "";
                if (now > monster.timer) {
                    const angle = [0, Math.PI/2, Math.PI, 3*Math.PI/2][Math.floor(Math.random()*4)];
                    monster.targetX = Math.cos(angle); monster.targetY = Math.sin(angle);
                    monster.timer = now + 1000 + Math.random() * 2000;
                }
                let mx = monster.x + monster.targetX * 0.06;
                let my = monster.y + monster.targetY * 0.06;
                if (!isColliding(mx, my)) { monster.x = mx; monster.y = my; }
                else { monster.timer = 0; }

                if (dist < 8) { monster.state = 'SPOTTED'; monster.timer = now + 5000; }
            } 
            else if (monster.state === 'SPOTTED') {
                statusEl.innerText = "IT SAW YOU.";
                if (now > monster.timer) { monster.state = 'CHASING'; monster.timer = now + 10000; }
            } 
            else if (monster.state === 'CHASING') {
                statusEl.innerText = "RUN!!!";
                const angle = Math.atan2(player.y - monster.y, player.x - monster.x);
                monster.x += Math.cos(angle) * monster.speed;
                monster.y += Math.sin(angle) * monster.speed;
                if (now > monster.timer) monster.state = 'WANDERING';
            }

            if (dist < 0.5) { alert("ZAURA CAUGHT YOU"); location.reload(); }
            if (player.x > GRID_SIZE - 1) { alert("YOU SURVIVED"); location.reload(); }
        }

        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x * TILE_SIZE, canvas.height / 2 - player.y * TILE_SIZE);

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (maze[y][x] === 1) { ctx.fillStyle = '#111'; ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE); }
                    else if (maze[y][x] === 2) { ctx.fillStyle = '#0f0'; ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE); }
                }
            }

            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x * TILE_SIZE, player.y * TILE_SIZE, 10, 0, Math.PI * 2); ctx.fill();
            ctx.drawImage(monsterImg, monster.x * TILE_SIZE - 40, monster.y * TILE_SIZE - 40, 80, 80);
            ctx.restore();

            const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 20, canvas.width/2, canvas.height/2, 500);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'black');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
