<!DOCTYPE html>
<html>
<head>
<title>Ghost vs Pac-Man</title>
<style>
body { background:black; margin:0; text-align:center; }
h1 { color:yellow; font-family:sans-serif; }
canvas { background:#000; margin-top:10px; }
</style>
</head>
<body>

<h1>You are the Ghost — Catch Pac-Man</h1>
<p style="color:white">Use ARROW KEYS to move</p>

<canvas id="game" width="400" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 20;

// pellets
let pellets = [];
for (let i=2;i<18;i++){
 for (let j=2;j<18;j++){
  if (Math.random() > 0.85){
   pellets.push({x:i,y:j});
  }
 }
}

// player ghost (YOU)
let ghost = {x:1,y:1};

// pacman AI
let pac = {x:15,y:15};

let dir = {x:0,y:0};

document.addEventListener("keydown",e=>{
 if(e.key=="ArrowLeft")dir={x:-1,y:0};
 if(e.key=="ArrowRight")dir={x:1,y:0};
 if(e.key=="ArrowUp")dir={x:0,y:-1};
 if(e.key=="ArrowDown")dir={x:0,y:1};
});

// check distance
function dist(a,b){
 return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);
}

// update pacman AI
function updatePac(){
 let d = dist(pac,ghost);

 if(d < 4){
  // RUN AWAY
  pac.x += (pac.x < ghost.x) ? -1 : 1;
  pac.y += (pac.y < ghost.y) ? -1 : 1;
 } else {
  // GO TO PELLET
  if(pellets.length > 0){
   let p = pellets[0];
   pac.x += (pac.x < p.x) ? 1 : -1;
   pac.y += (pac.y < p.y) ? 1 : -1;
  }
 }
}

// update ghost
function updateGhost(){
 ghost.x += dir.x;
 ghost.y += dir.y;

 ghost.x = Math.max(0,Math.min(19,ghost.x));
 ghost.y = Math.max(0,Math.min(19,ghost.y));
}

// eat pellets
function eat(){
 pellets = pellets.filter(p=>{
  return !(p.x==pac.x && p.y==pac.y);
 });
}

// draw everything
function draw(){

 ctx.fillStyle="black";
 ctx.fillRect(0,0,400,400);

 // pellets
 ctx.fillStyle="white";
 for(let p of pellets){
  ctx.fillRect(p.x*20,p.y*20,5,5);
 }

 // ghost (YOU)
 ctx.fillStyle="cyan";
 ctx.beginPath();
 ctx.arc(ghost.x*20,ghost.y*20,8,0,Math.PI*2);
 ctx.fill();

 // pacman AI
 ctx.fillStyle="yellow";
 ctx.beginPath();
 ctx.arc(pac.x*20,pac.y*20,8,0,Math.PI*2);
 ctx.fill();

 // win check
 if(dist(ghost,pac)<1){
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("YOU CAUGHT PAC-MAN!",80,200);
 }
}

// loop
function loop(){
 updateGhost();
 updatePac();
 eat();
 draw();
 requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
