<!DOCTYPE html>
<html>
<head>
    <title>THE MAZE: FIRST PERSON</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 100; pointer-events: none; }
        #freeze-warning { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 45px; font-weight: bold; display: none; text-align: center; text-shadow: 3px 3px black; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: red; display: none; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>
    <div id="ui">
        <b>WASD:</b> Move | <b>Shift:</b> Sprint<br>
        <b>STATUS:</b> <span id="status">SAFE</span><br>
        <i>STILLNESS TIMER: <span id="timer">10</span>s</i>
    </div>
    <div id="freeze-warning">DON'T MOVE!</div>
    <div id="game-over"><h1>CAUGHT.</h1></div>

    <script src="https://cloudflare.com"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 1, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- POWERFUL LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const headlamp = new THREE.PointLight(0xffffff, 1, 30);
        camera.add(headlamp);
        scene.add(camera);

        // --- MAZE ---
        const mazeSize = 30, wallSize = 8;
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const wallGeo = new THREE.BoxGeometry(wallSize, 12, wallSize);

        for(let x=0; x<mazeSize; x++) {
            for(let z=0; z<mazeSize; z++) {
                if(x==0 || x==mazeSize-1 || z==0 || z==mazeSize-1 || (x%4==0 && z%4==0)) {
                    const wall = new THREE.Mesh(wallGeo, wallMat);
                    wall.position.set(x*wallSize - 120, 6, z*wallSize - 120);
                    scene.add(wall);
                }
            }
        }
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshPhongMaterial({color: 0x050505})).rotateX(-Math.PI/2));

        // --- MONSTERS WITH YOUR IMAGES ---
        const loader = new THREE.TextureLoader();
        const monsterImgs = [
            'https://deepai.org', // Skull
            'https://deepai.org'  // Black Face
        ];

        function makeMonster(imgUrl, x, z) {
            const tex = loader.load(imgUrl);
            const mat = new THREE.SpriteMaterial({ map: tex });
            const s = new THREE.Sprite(mat);
            s.scale.set(6, 10, 1);
            s.position.set(x, 5, z);
            s.userData = { state: "WANDER", target: new THREE.Vector3(x, 5, z), stillTimer: 0 };
            scene.add(s);
            return s;
        }
        const monsters = [makeMonster(monsterImgs[0], 40, 40), makeMonster(monsterImgs[1], -40, -40)];

        // --- CONTROLS ---
        let yaw = 0, pitch = 0, playerPos = new THREE.Vector3(-100, 2, -100);
        const keys = {};
        document.body.addEventListener('click', () => renderer.domElement.requestPointerLock());
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                yaw -= e.movementX*0.003; pitch -= e.movementY*0.003;
                pitch = Math.max(-1.2, Math.min(1.2, pitch));
            }
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];
            const speed = keys['ShiftLeft'] ? 0.4 : 0.2;
            
            if(isMoving) {
                const move = new THREE.Vector3();
                if(keys['KeyW']) move.z -= speed; if(keys['KeyS']) move.z += speed;
                if(keys['KeyA']) move.x -= speed; if(keys['KeyD']) move.x += speed;
                move.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                playerPos.add(move);
            }

            camera.position.copy(playerPos);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');

            let detected = false;
            monsters.forEach((m) => {
                const dist = m.position.distanceTo(playerPos);
                
                if(m.userData.state === "WANDER") {
                    if(m.position.distanceTo(m.userData.target) < 4) {
                        m.userData.target.set((Math.random()-0.5)*200, 5, (Math.random()-0.5)*200);
                    }
                    m.position.add(new THREE.Vector3().subVectors(m.userData.target, m.position).normalize().multiplyScalar(0.08));
                    if(dist < 25) { m.userData.state = "SPOTTED"; m.userData.stillTimer = Date.now(); }
                } 
                else if(m.userData.state === "SPOTTED") {
                    detected = true;
                    let elapsed = Math.floor((Date.now() - m.userData.stillTimer)/1000);
                    document.getElementById('timer').innerText = 10 - elapsed;

                    if(isMoving) { // CHARGE IF YOU MOVE
                        m.position.add(new THREE.Vector3().subVectors(playerPos, m.position).normalize().multiplyScalar(0.5));
                    }

                    if(dist < 2) { 
                        document.getElementById('game-over').style.display='flex';
                        setTimeout(()=>location.reload(), 2500); 
                    }
                    if(elapsed >= 10) { 
                        m.userData.state = "WANDER"; 
                        m.position.set((Math.random()-0.5)*180, 5, (Math.random()-0.5)*180);
                    }
                }
            });

            document.getElementById('status').innerText = detected ? "SPOTTED!" : "SAFE";
            document.getElementById('freeze-warning').style.display = detected ? 'block' : 'none';
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
