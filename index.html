<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Realistic Jumping Spider</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px;
            pointer-events: none; border: 1px solid #444;
        }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px;
            display: none; text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>Webs Available:</b> <span id="webCount">5</span>/5<br>
        <b>Flies Eaten:</b> <span id="score">0</span><br>
        <hr>
        <b>Click to Start</b><br>
        <b>Mouse:</b> Look | <b>WASD:</b> Move<br>
        <b>Space:</b> Jump | <b>E:</b> Safety Web
    </div>
    <div id="msg"><h2>YOU FELL!</h2>Restarting...</div>

    <script src="https://cloudflare.com"></script>
    <script>
        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff);
        scene.fog = new THREE.FogExp2(0xaaccff, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x666666));

        // --- GAME STATE ---
        let score = 0, websLeft = 5, isJumping = false, velocityY = 0;
        const gravity = -0.012;
        let activeWeb = null;
        let isDead = false;

        // --- SPIDER MODEL ---
        const spiderGroup = new THREE.Group();
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        
        // Cephalothorax (Head)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), bodyMat);
        head.position.z = 0.15;
        spiderGroup.add(head);

        // Abdomen (Back)
        const abdomen = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), bodyMat);
        abdomen.scale.set(1, 0.8, 1.3);
        spiderGroup.add(abdomen);

        // Eyes (Jumping spiders have big front eyes)
        const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000, shininess: 100 });
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), eyeMat);
        const eyeL = eye.clone(); eyeL.position.set(0.08, 0.05, 0.32);
        const eyeR = eye.clone(); eyeR.position.set(-0.08, 0.05, 0.32);
        spiderGroup.add(eyeL, eyeR);

        spiderGroup.position.set(0, 1.5, 0);
        scene.add(spiderGroup);

        // --- ENVIRONMENT ---
        // Ground (Dangerous level)
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x3d2b1f }); // Dirt color
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Leaves & Plants
        const leaves = [];
        function createPlant(x, z, height) {
            const stemGeo = new THREE.CylinderGeometry(0.05, 0.1, height, 8);
            const stemMat = new THREE.MeshPhongMaterial({ color: 0x4a3728 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.set(x, height/2, z);
            scene.add(stem);

            const leafGeo = new THREE.CircleGeometry(1.2, 32);
            const leafMat = new THREE.MeshPhongMaterial({ color: 0x228B22, side: THREE.DoubleSide });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.rotation.x = Math.PI / 2;
            leaf.position.set(x, height, z);
            leaf.receiveShadow = true;
            scene.add(leaf);
            leaves.push(leaf);
        }

        // Spawn a start leaf and random foliage
        createPlant(0, 0, 1.2);
        for(let i=0; i<25; i++) {
            createPlant((Math.random()-0.5)*40, (Math.random()-0.5)*40, 1 + Math.random()*6);
        }

        // --- MOUSE LOOK & MOVEMENT ---
        let pitch = 0, yaw = 0;
        document.body.addEventListener('click', () => document.body.requestPointerLock());
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
            }
        });

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (activeWeb && spiderGroup.position.y < activeWeb.startPos.y) {
                    // Safety Pull Up
                    spiderGroup.position.copy(activeWeb.startPos);
                    scene.remove(activeWeb.mesh);
                    activeWeb = null;
                    isJumping = false;
                    velocityY = 0;
                } else if (!isJumping) {
                    velocityY = 0.22;
                    isJumping = true;
                }
            }
            if (e.code === 'KeyE' && websLeft > 0 && isJumping && !activeWeb) {
                deployWeb();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function deployWeb() {
            websLeft--;
            document.getElementById('webCount').innerText = websLeft;
            const startPos = spiderGroup.position.clone();
            const points = [startPos, new THREE.Vector3(startPos.x, startPos.y + 10, startPos.z)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            const web = new THREE.Line(lineGeo, lineMat);
            scene.add(web);
            activeWeb = { mesh: web, startPos: startPos };
        }

        // --- CORE LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (isDead) return;

            // Rotation
            spiderGroup.rotation.y = yaw;
            
            // Movement relative to camera view
            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            moveDir.applyQuaternion(spiderGroup.quaternion).normalize().multiplyScalar(0.12);
            spiderGroup.position.add(moveDir);

            // Gravity & Safety Catch
            if (isJumping) {
                spiderGroup.position.y += velocityY;
                velocityY += gravity;

                // Web protection: Fall only a little bit then stop
                if (activeWeb && spiderGroup.position.y < activeWeb.startPos.y - 1.5) {
                    spiderGroup.position.y = activeWeb.startPos.y - 1.5;
                    velocityY = 0;
                }

                // Check landing on leaves
                leaves.forEach(leaf => {
                    const dist = new THREE.Vector2(spiderGroup.position.x - leaf.position.x, spiderGroup.position.z - leaf.position.z).length();
                    if (dist < 1.2 && velocityY < 0 && Math.abs(spiderGroup.position.y - leaf.position.y) < 0.3) {
                        isJumping = false;
                        velocityY = 0;
                        spiderGroup.position.y = leaf.position.y + 0.2;
                        if (activeWeb) { scene.remove(activeWeb.mesh); activeWeb = null; }
                    }
                });

                // Fall Death Logic
                if (spiderGroup.position.y < 0.25) {
                    die();
                }
            }

            // Update Camera
            const camOffset = new THREE.Vector3(0, 0.5, 2.5).applyQuaternion(spiderGroup.quaternion);
            camera.position.copy(spiderGroup.position).add(camOffset);
            camera.lookAt(spiderGroup.position.clone().add(new THREE.Vector3(0, 0, -5).applyQuaternion(spiderGroup.quaternion)));

            renderer.render(scene, camera);
        }

        function die() {
            isDead = true;
            document.getElementById('msg').style.display = 'block';
            setTimeout(() => {
                location.reload();
            }, 2000);
        }

        animate();
    </script>
</body>
</html>
