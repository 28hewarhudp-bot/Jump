<!DOCTYPE html>
<html>
<head>
    <title>Jumping Spider: Fly Hunter 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 12px; pointer-events: none; border: 2px solid #2e7d32; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.9); padding: 30px; display: none; text-align: center; border-radius: 15px; font-size: 24px; }
        .stat { font-size: 1.2em; color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <span class="stat">FLIES EATEN:</span> <span id="score">0</span><br>
        <span class="stat">WEBS LEFT:</span> <span id="webCount">5</span>/5<br>
        <hr>
        <b>CLICK TO HUNT</b><br>
        WASD: Walk | SPACE: Jump<br>
        E: Safety Web (In Air)
    </div>
    <div id="msg"><h2>YOU HIT THE DIRT!</h2>Restarting...</div>

    <script src="https://unpkg.com"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3d1ff);
        scene.fog = new THREE.FogExp2(0xa3d1ff, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // LIGHTING
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(20, 40, 20);
        sun.castShadow = true;
        scene.add(sun);

        // SPIDER (8 Legs + Fuzzy Texture + Eyes)
        const spider = new THREE.Group();
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a, flatShading: false });
        
        // Cephalothorax & Abdomen
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 12), bodyMat);
        head.position.z = 0.2;
        const abdomen = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 12), bodyMat);
        abdomen.scale.set(1, 0.8, 1.4);
        spider.add(head, abdomen);

        // 8 Realistic Eyes
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const bigEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeMat);
        bigEyeL.position.set(0.12, 0.15, 0.42);
        const bigEyeR = bigEyeL.clone(); bigEyeR.position.x = -0.12;
        spider.add(bigEyeL, bigEyeR);
        for(let i=0; i<6; i++) {
            const smallEye = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), eyeMat);
            smallEye.position.set((Math.random()-0.5)*0.3, 0.2, 0.35);
            spider.add(smallEye);
        }

        // Legs
        const legMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        for(let i=0; i<8; i++) {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8), legMat);
            leg.rotation.z = (i < 4 ? 1 : -1) * Math.PI/3;
            leg.position.set(i < 4 ? 0.4 : -0.4, -0.1, (i % 4) * 0.2 - 0.3);
            spider.add(leg);
        }
        
        spider.position.set(0, 3, 0);
        scene.add(spider);

        // GROUND
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x3d2b1f}));
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        // PLANTS & FLIES
        const leaves = [];
        const flies = [];

        function createPlant(x, z, h) {
            const plant = new THREE.Group();
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, h), new THREE.MeshPhongMaterial({color: 0x4d3926}));
            stem.position.y = h/2;
            const leaf = new THREE.Mesh(new THREE.CircleGeometry(2.5, 32), new THREE.MeshPhongMaterial({color: 0x2e7d32, side: THREE.DoubleSide}));
            leaf.rotation.x = Math.PI/2;
            leaf.position.y = h;
            leaf.receiveShadow = true;
            plant.add(stem, leaf);
            plant.position.set(x, 0, z);
            scene.add(plant);
            leaves.push(leaf);

            // Randomly spawn a fly on this leaf
            if (Math.random() > 0.4) spawnFly(x, h + 0.6, z);
        }

        function spawnFly(x, y, z) {
            const fly = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshPhongMaterial({color: 0x00ff00}));
            fly.position.set(x, y, z);
            scene.add(fly);
            flies.push(fly);
        }

        // Generate Forest
        createPlant(0, 0, 2.5); // Home
        for(let i=0; i<40; i++) {
            createPlant((Math.random()-0.5)*120, (Math.random()-0.5)*120, 2 + Math.random()*12);
        }

        // CONTROLS
        let yaw = 0;
        document.body.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('mousemove', (e) => { if(document.pointerLockElement) yaw -= e.movementX * 0.003; });
        
        const keys = {};
        let score = 0, isJumping = false, velY = 0, webs = 5, activeWeb = null;

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Space') {
                if(activeWeb) { // CLIMB UP
                    spider.position.y = activeWeb.top.y;
                    scene.remove(activeWeb.line);
                    activeWeb = null; isJumping = false;
                } else if(!isJumping) {
                    velY = 0.28; isJumping = true;
                }
            }
            if(e.code === 'KeyE' && isJumping && webs > 0 && !activeWeb) {
                webs--; document.getElementById('webCount').innerText = webs;
                const pts = [spider.position.clone(), new THREE.Vector3(spider.position.x, 50, spider.position.z)];
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color: 0xffffff, linewidth: 3}));
                scene.add(line);
                activeWeb = { line, top: spider.position.clone() };
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // GAME LOOP
        function animate() {
            requestAnimationFrame(animate);
            
            spider.rotation.y = yaw;
            const move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 0.2; if(keys['KeyS']) move.z += 0.2;
            if(keys['KeyA']) move.x -= 0.2; if(keys['KeyD']) move.x += 0.2;
            move.applyQuaternion(spider.quaternion);
            spider.position.add(move);

            if(isJumping) {
                spider.position.y += velY;
                velY -= 0.012; 

                // WEB CATCH
                if(activeWeb && spider.position.y < activeWeb.top.y - 3) {
                    spider.position.y = activeWeb.top.y - 3;
                    velY = 0;
                }

                // LANDING
                leaves.forEach(l => {
                    const wp = new THREE.Vector3(); l.getWorldPosition(wp);
                    const d = new THREE.Vector2(spider.position.x - wp.x, spider.position.z - wp.z).length();
                    if(d < 2.5 && velY < 0 && Math.abs(spider.position.y - wp.y) < 0.5) {
                        isJumping = false; velY = 0;
                        spider.position.y = wp.y + 0.3;
                        if(activeWeb) { scene.remove(activeWeb.line); activeWeb = null; }
                    }
                });

                // FLY COLLISION
                flies.forEach((f, idx) => {
                    if(spider.position.distanceTo(f.position) < 0.8) {
                        scene.remove(f);
                        flies.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                });

                // DEATH
                if(spider.position.y < 0.4) {
                    document.getElementById('msg').style.display='block';
                    setTimeout(() => location.reload(), 1500);
                }
            }

            const camPos = new THREE.Vector3(0, 1.5, 6).applyQuaternion(spider.quaternion);
            camera.position.copy(spider.position).add(camPos);
            camera.lookAt(spider.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
