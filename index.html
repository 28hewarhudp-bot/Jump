<!DOCTYPE html>
<html>
<body style="margin:0; background:#000; overflow:hidden;">
    <div id="m" style="position:fixed; color:white; width:100%; text-align:center; top:40%; font-family:sans-serif;">
        <h1>ZAURA'S MAZE</h1>
        <button onclick="start()" style="padding:20px; font-size:20px; cursor:pointer;">CLICK HERE TO START</button>
        <p>Once started, CLICK ANYWHERE to move your character.</p>
    </div>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let active = false;
        let px = 100, py = 100;
        let mx = 500, my = 500;
        let targetX = 100, targetY = 100;
        let monsterState = 'WANDERING';
        let monsterTimer = 0;

        const monsterImg = new Image();
        monsterImg.src = 'https://ibb.co';

        function start() {
            document.getElementById('m').style.display = 'none';
            active = true;
        }

        window.addEventListener('mousedown', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        function loop() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(active) {
                // Move Player toward target
                px += (targetX - px) * 0.1;
                py += (targetY - py) * 0.1;

                // Monster AI
                let dist = Math.hypot(mx - px, my - py);
                let now = Date.now();

                if(monsterState === 'WANDERING') {
                    mx += (Math.random() - 0.5) * 5;
                    my += (Math.random() - 0.5) * 5;
                    if(dist < 200) { monsterState = 'SPOTTED'; monsterTimer = now + 5000; }
                } else if(monsterState === 'SPOTTED') {
                    if(now > monsterTimer) { monsterState = 'CHASING'; monsterTimer = now + 10000; }
                } else {
                    mx += (px - mx) * 0.02;
                    my += (py - my) * 0.02;
                    if(now > monsterTimer) monsterState = 'WANDERING';
                }

                if(dist < 50) { alert("CAUGHT"); location.reload(); }
            }

            ctx.fillStyle = 'black';
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Draw skinny maze lines
            ctx.strokeStyle = '#333';
            for(let i=0; i<canvas.width; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }

            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(px, py, 15, 0, Math.PI*2); ctx.fill();
            ctx.drawImage(monsterImg, mx-50, my-50, 100, 100);

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
