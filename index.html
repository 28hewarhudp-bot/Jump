<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Jumping Spider</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px;
            pointer-events: none; line-height: 1.6;
        }
        b { color: #4CAF50; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Webs:</b> <span id="webCount">5</span>/5<br>
        <b>Flies Eaten:</b> <span id="score">0</span><br>
        <hr>
        <b>WASD:</b> Move | <b>Space:</b> Jump<br>
        <b>E:</b> Place Web (while jumping)<br>
        <b>Space (on web):</b> Pull back to start
    </div>

    <!-- Load Three.js from a CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. SETUP THE 3D WORLD ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 2. GAME STATE ---
        let websLeft = 5;
        let score = 0;
        let isJumping = false;
        let velocityY = 0;
        const gravity = -0.008;
        let activeWeb = null;

        // --- 3. CREATE OBJECTS ---
        // The Spider
        const spiderBody = new THREE.SphereGeometry(0.2, 32, 32);
        const spiderMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const spider = new THREE.Mesh(spiderBody, spiderMat);
        spider.position.set(0, 1, 0);
        scene.add(spider);

        // Leaves (Platforms)
        const leaves = [];
        function createLeaf(x, y, z) {
            const leafGeo = new THREE.CylinderGeometry(1.5, 1.2, 0.2, 32);
            const leafMat = new THREE.MeshPhongMaterial({ color: 0x2E7D32 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.set(x, y, z);
            scene.add(leaf);
            leaves.push(leaf);
        }

        // Generate a random forest of leaves
        createLeaf(0, 0, 0); // Starting leaf
        for(let i=0; i<15; i++) {
            createLeaf(
                (Math.random() - 0.5) * 30, 
                Math.random() * 8, 
                (Math.random() - 0.5) * 30
            );
        }

        // Flies
        const flies = [];
        function createFly() {
            const flyGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const flyMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const fly = new THREE.Mesh(flyGeo, flyMat);
            const targetLeaf = leaves[Math.floor(Math.random() * leaves.length)];
            fly.position.set(targetLeaf.position.x, targetLeaf.position.y + 0.5, targetLeaf.position.z);
            scene.add(fly);
            flies.push(fly);
        }
        for(let i=0; i<5; i++) createFly();

        // --- 4. CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.addEventListener('keydown', (e) => {
            // Jump or Web Climb
            if (e.code === 'Space') {
                if (activeWeb) {
                    // Safety Web: Pulls you back to where you started the jump
                    spider.position.copy(activeWeb.startPos);
                    scene.remove(activeWeb.mesh);
                    activeWeb = null;
                    isJumping = false;
                    velocityY = 0;
                } else if (!isJumping) {
                    velocityY = 0.18;
                    isJumping = true;
                }
            }
            // Place Web (Only while in mid-air)
            if (e.code === 'KeyE' && websLeft > 0 && isJumping && !activeWeb) {
                placeWeb();
            }
        });

        function placeWeb() {
            websLeft--;
            document.getElementById('webCount').innerText = websLeft;
            const startPos = spider.position.clone();
            
            // Draw a white line from current position to a point above
            const points = [startPos, new THREE.Vector3(startPos.x, startPos.y + 5, startPos.z)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            const line = new THREE.Line(lineGeo, lineMat);
            
            scene.add(line);
            activeWeb = { mesh: line, startPos: startPos };
        }

        // --- 5. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Basic Movement
            if (keys['KeyW']) spider.position.z -= 0.1;
            if (keys['KeyS']) spider.position.z += 0.1;
            if (keys['KeyA']) spider.position.x -= 0.1;
            if (keys['KeyD']) spider.position.x += 0.1;

            // Physics & Gravity
            if (isJumping) {
                spider.position.y += velocityY;
                velocityY += gravity;

                // Check for landing on a leaf
                leaves.forEach(leaf => {
                    const dist = new THREE.Vector2(spider.position.x - leaf.position.x, spider.position.z - leaf.position.z).length();
                    if (dist < 1.5 && velocityY < 0 && Math.abs(spider.position.y - leaf.position.y) < 0.3) {
                        isJumping = false;
                        velocityY = 0;
                        spider.position.y = leaf.position.y + 0.2;
                        // Clear old web on landing
                        if (activeWeb) { scene.remove(activeWeb.mesh); activeWeb = null; }
                    }
                });

                // Reset if you fall too far
                if (spider.position.y < -15) {
                    spider.position.set(0, 1, 0);
                    isJumping = false;
                    velocityY = 0;
                    if (activeWeb) { scene.remove(activeWeb.mesh); activeWeb = null; }
                }
            }

            // Fly Detection
            flies.forEach((fly, index) => {
                if (spider.position.distanceTo(fly.position) < 0.6) {
                    scene.remove(fly);
                    flies.splice(index, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                    createFly(); // Spawn a new one
                }
            });

            // Camera Tracking
            camera.position.set(spider.position.x, spider.position.y + 4, spider.position.z + 8);
            camera.lookAt(spider.position);

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
