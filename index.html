<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8-Bit Maze Quest</title>
<style>
body {
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}
canvas {
    image-rendering: pixelated;
    border:4px solid white;
}
</style>
</head>
<body>
<canvas id="game" width="960" height="640"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE = 32;
const ROWS = 20;
const COLS = 30;

const maze = [];
for(let y=0;y<ROWS;y++){
    maze[y]=[];
    for(let x=0;x<COLS;x++){
        if(y===0||x===0||y===ROWS-1||x===COLS-1||Math.random()<0.25){
            maze[y][x]=1;
        }else{
            maze[y][x]=0;
        }
    }
}

maze[1][1]=0;

const player = {
    x:1,
    y:1,
    color:"cyan"
};

const monster = {
    x:COLS-2,
    y:ROWS-2,
    color:"red"
};

const keys = [];
for(let i=0;i<8;i++){
    let x,y;
    do{
        x=Math.floor(Math.random()*COLS);
        y=Math.floor(Math.random()*ROWS);
    }while(maze[y][x]!==0);

    keys.push({x,y});
}

let collected = 0;
let gameOver = false;
let win = false;

const input = {};
window.addEventListener("keydown", e=> input[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e=> input[e.key.toLowerCase()] = false);

function moveCharacter(char, dx, dy){
    const nx = char.x + dx;
    const ny = char.y + dy;

    if(nx>=0 && ny>=0 && nx<COLS && ny<ROWS && maze[ny][nx]===0){
        char.x = nx;
        char.y = ny;
    }
}

function update(){
    if(gameOver || win) return;

    if(input["arrowup"] || input["w"]){
        moveCharacter(player,0,-1);
    }
    if(input["arrowdown"] || input["s"]){
        moveCharacter(player,0,1);
    }
    if(input["arrowleft"] || input["a"]){
        moveCharacter(player,-1,0);
    }
    if(input["arrowright"] || input["d"]){
        moveCharacter(player,1,0);
    }

    const dirs = [
        [1,0],[-1,0],[0,1],[0,-1]
    ];

    let bestMove = null;
    let bestDistance = Infinity;

    for(const dir of dirs){
        const nx = monster.x + dir[0];
        const ny = monster.y + dir[1];

        if(nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        if(maze[ny][nx] !== 0) continue;

        const distance = Math.abs(player.x - nx) + Math.abs(player.y - ny);

        if(distance < bestDistance){
            bestDistance = distance;
            bestMove = dir;
        }
    }

    if(bestMove){
        monster.x += bestMove[0];
        monster.y += bestMove[1];
    }

    for(let i=keys.length-1;i>=0;i--){
        if(keys[i].x===player.x && keys[i].y===player.y){
            keys.splice(i,1);
            collected++;
        }
    }

    if(player.x===monster.x && player.y===monster.y){
        gameOver = true;
    }

    if(keys.length===0){
        win = true;
    }
}

function draw(){
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            if(maze[y][x]===1){
                ctx.fillStyle = "blue";
                ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
            }
        }
    }

    keys.forEach(k=>{
        ctx.fillStyle = "yellow";
        ctx.fillRect(k.x*TILE+8,k.y*TILE+8,16,16);
    });

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x*TILE+4,player.y*TILE+4,24,24);

    ctx.fillStyle = monster.color;
    ctx.fillRect(monster.x*TILE+4,monster.y*TILE+4,24,24);

    ctx.fillStyle = "white";
    ctx.font = "20px monospace";
    ctx.fillText("Keys: " + collected, 10, 25);

    if(gameOver){
        ctx.font = "50px monospace";
        ctx.fillText("GAME OVER", 320, 320);
    }

    if(win){
        ctx.font = "50px monospace";
        ctx.fillText("YOU WIN!", 340, 320);
    }
}

function loop(){
    update();
    draw();
    setTimeout(()=>requestAnimationFrame(loop),120);
}

loop();


// ===== UPGRADED SYSTEMS =====
const doors = [];
for(let i=0;i<4;i++){
    let x,y;
    do{
        x=Math.floor(Math.random()*COLS);
        y=Math.floor(Math.random()*ROWS);
    }while(maze[y][x]!==0 || (x===1&&y===1));
    maze[y][x]=2;
    doors.push({x,y,open:false});
}

const monsters = [monster];
for(let i=0;i<2;i++){
    monsters.push({
        x:COLS-3-i,
        y:ROWS-3,
        color:"orange"
    });
}

let boss = {
    x:Math.floor(COLS/2),
    y:Math.floor(ROWS/2),
    color:"purple"
};

function canWalk(x,y){
    if(x<0||y<0||x>=COLS||y>=ROWS) return false;
    return maze[y][x]===0;
}

function moveHunter(m){
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    let best=null;
    let bestDist=Infinity;

    for(const d of dirs){
        const nx=m.x+d[0];
        const ny=m.y+d[1];
        if(!canWalk(nx,ny)) continue;

        const dist=Math.abs(player.x-nx)+Math.abs(player.y-ny);
        if(dist<bestDist){
            bestDist=dist;
            best=d;
        }
    }

    if(best){
        m.x+=best[0];
        m.y+=best[1];
    }
}

const oldUpdate = update;
update = function(){
    oldUpdate();

    if(collected>=4){
        doors.forEach(d=>{
            d.open=true;
            maze[d.y][d.x]=0;
        });
    }

    monsters.forEach(m=>moveHunter(m));
    moveHunter(boss);

    monsters.forEach(m=>{
        if(m.x===player.x&&m.y===player.y){
            gameOver=true;
        }
    });

    if(boss.x===player.x&&boss.y===player.y){
        gameOver=true;
    }
};

const oldDraw = draw;
draw = function(){
    oldDraw();

    ctx.fillStyle="rgba(0,0,0,.85)";
    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            const d=Math.abs(player.x-x)+Math.abs(player.y-y);
            if(d>5){
                ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
            }
        }
    }

    monsters.forEach(m=>{
        ctx.fillStyle=m.color;
        ctx.fillRect(m.x*TILE+4,m.y*TILE+4,24,24);
    });

    ctx.fillStyle=boss.color;
    ctx.fillRect(boss.x*TILE,boss.y*TILE,32,32);
};
</script>
</body>
</html>
