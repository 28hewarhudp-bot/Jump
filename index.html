<!DOCTYPE html>
<html>
<head>
    <title>Spider Garden: Top Down</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: sans-serif; overflow: hidden; }
        canvas { background: #4e3b31; border: 5px solid #2d1f18; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; color: white; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="web-display">WEBS: 5/5</h2>
        <p>WASD to Move | SPACE to Jump | E for Safety Web | F to Attack Flies</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        let webs = 5;
        let flies = [];
        let leaves = [];
        let safetyWeb = null;
        let frame = 0;

        const player = {
            x: 400, y: 300, radius: 15, 
            isJumping: false, jumpScale: 1,
            onLeaf: true
        };

        // Create random giant leaves
        for(let i=0; i<8; i++) {
            leaves.push({
                x: Math.random() * 700 + 50,
                y: Math.random() * 500 + 50,
                r: Math.random() * 40 + 60
            });
        }

        function spawnFly() {
            flies.push({ x: Math.random() * 750, y: Math.random() * 550 });
        }
        for(let i=0; i<3; i++) spawnFly();

        const keys = {};
        window.onkeydown = (e) => {
            keys[e.key.toLowerCase()] = true;
            if(e.key === 'e' && !safetyWeb && webs > 0) {
                webs--;
                safetyWeb = { x: player.x, y: player.y };
                updateUI();
            }
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function updateUI() {
            document.getElementById('web-display').innerText = `WEBS: ${webs}/5`;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;

            // Draw Leaves
            ctx.fillStyle = "#2d5a27";
            leaves.forEach(l => {
                ctx.beginPath(); ctx.arc(l.x, l.y, l.r, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#32CD32"; ctx.lineWidth = 3; ctx.stroke();
            });

            // Draw Safety Web
            if(safetyWeb) {
                ctx.strokeStyle = "white"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(safetyWeb.x, safetyWeb.y); ctx.lineTo(player.x, player.y); ctx.stroke();
                // Anchor point
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(safetyWeb.x, safetyWeb.y, 4, 0, Math.PI*2); ctx.fill();
            }

            // Draw Flies
            ctx.fillStyle = "yellow";
            flies.forEach(f => {
                ctx.beginPath(); ctx.arc(f.x, f.y, 5, 0, Math.PI*2); ctx.fill();
            });

            // Movement Logic
            let speed = 4;
            if(keys['a']) player.x -= speed;
            if(keys['d']) player.x += speed;
            if(keys['w']) player.y -= speed;
            if(keys['s']) player.y += speed;

            // Jumping Logic
            if(keys[' '] && !player.isJumping) {
                player.isJumping = true;
                player.jumpScale = 1.5; // Visual jump height
                setTimeout(() => {
                    player.isJumping = false;
                    player.jumpScale = 1;
                    checkLanding();
                }, 500);
            }

            // Reel in Web (Hold Space while falling)
            if(keys[' '] && safetyWeb && !player.onLeaf) {
                let dx = safetyWeb.x - player.x;
                let dy = safetyWeb.y - player.y;
                player.x += dx * 0.1;
                player.y += dy * 0.1;
            }

            // Attack Logic (F)
            if(keys['f']) {
                flies.forEach((f, i) => {
                    let dist = Math.hypot(player.x - f.x, player.y - f.y);
                    if(dist < 30) {
                        flies.splice(i, 1);
                        webs = Math.min(5, webs + 1);
                        updateUI();
                        spawnFly();
                    }
                });
            }

            function checkLanding() {
                let landed = false;
                leaves.forEach(l => {
                    if(Math.hypot(player.x - l.x, player.y - l.y) < l.r) landed = true;
                });
                player.onLeaf = landed;
                if(!landed && !safetyWeb) {
                    alert("You fell off the leaf! Game Over.");
                    location.reload();
                } else if (landed) {
                    safetyWeb = null; // Reset web on safe landing
                }
            }

            // Draw Spider
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.scale(player.jumpScale, player.jumpScale);
            ctx.fillStyle = "black";
            // Body
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
            // Eyes
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(-5, -5, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -5, 3, 0, Math.PI*2); ctx.fill();
            // Legs (8 legs)
            ctx.strokeStyle = "black"; ctx.lineWidth = 3;
            for(let i=0; i<8; i++) {
                let angle = (i * Math.PI / 4) + (frame * 0.1);
                ctx.beginPath(); ctx.moveTo(0, 0); 
                ctx.lineTo(Math.cos(angle)*25, Math.sin(angle)*25); ctx.stroke();
            }
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
