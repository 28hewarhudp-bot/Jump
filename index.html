<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Massive Zaura Maze</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #f00; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #status { font-size: 32px; font-weight: bold; text-shadow: 2px 2px #000; }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-screen" onclick="start()">
        <h1 style="font-size: 50px; color: white;">THE GIANT MAZE</h1>
        <p style="color: #888;">CLICK TO START</p>
        <p style="color: #444;">USE WASD TO MOVE</p>
    </div>

    <div id="ui"><div id="status"></div></div>
    <canvas id="mazeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        let gameActive = false;

        // Settings
        const GRID_SIZE = 101; // Massive "Maze Runner" style size
        const TILE_SIZE = 90;
        let maze = [];
        
        const player = { x: 1, y: 1, speed: 0.2 };
        const monster = { 
            x: GRID_SIZE - 2, y: GRID_SIZE - 2, 
            speed: 0.14, state: 'WANDERING', timer: 0,
            targetX: 0, targetY: 0
        };

        const monsterImg = new Image();
        monsterImg.src = 'https://ibb.co';

        function start() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            window.focus(); // Force browser to listen to keyboard
        }

        function generateMaze() {
            for (let y = 0; y < GRID_SIZE; y++) maze[y] = Array(GRID_SIZE).fill(1);
            function walk(x, y) {
                maze[y][x] = 0;
                const neighbors = [[x, y - 2], [x, y + 2], [x - 2, y], [x + 2, y]].sort(() => Math.random() - 0.5);
                for (const [nx, ny] of neighbors) {
                    if (nx > 0 && nx < GRID_SIZE - 1 && ny > 0 && ny < GRID_SIZE - 1 && maze[ny][nx] === 1) {
                        maze[ny + (y - ny) / 2][nx + (x - nx) / 2] = 0;
                        walk(nx, ny);
                    }
                }
            }
            walk(1, 1);
            maze[GRID_SIZE - 2][GRID_SIZE - 1] = 0; // Ensure exit path is clear
            
            // --- SPAWN PROTECTION ---
            // Finds the first available open floor near the start so you don't get stuck in a wall
            let foundSpawn = false;
            for(let y = 1; y < 10; y++) {
                for(let x = 1; x < 10; x++) {
                    if(maze[y][x] === 0) {
                        player.x = x + 0.5;
                        player.y = y + 0.5;
                        foundSpawn = true;
                        break;
                    }
                }
                if(foundSpawn) break;
            }
        }
        generateMaze();

        // Keyboard Controls
        const keys = {};
        window.addEventListener('keydown', e => { 
            keys[e.key.toLowerCase()] = true; 
            if(["w","a","s","d"].includes(e.key.toLowerCase())) e.preventDefault(); // Stop page scrolling
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function isColliding(nx, ny) {
            const b = 0.2; // Hitbox size
            const checkPoints = [
                {x: nx-b, y: ny-b}, {x: nx+b, y: ny-b},
                {x: nx-b, y: ny+b}, {x: nx+b, y: ny+b}
            ];
            return checkPoints.some(p => {
                const mx = Math.floor(p.x);
                const my = Math.floor(p.y);
                return (mx < 0 || mx >= GRID_SIZE || my < 0 || my >= GRID_SIZE || maze[my][mx] === 1);
            });
        }

        function update() {
            if (!gameActive) return;

            // Movement Logic
            let dx = 0, dy = 0;
            if (keys['w']) dy -= player.speed;
            if (keys['s']) dy += player.speed;
            if (keys['a']) dx -= player.speed;
            if (keys['d']) dx += player.speed;

            if (!isColliding(player.x + dx, player.y)) player.x += dx;
            if (!isColliding(player.x, player.y + dy)) player.y += dy;

            // AI Logic
            const dist = Math.hypot(monster.x - player.x, monster.y - player.y);
            const now = Date.now();

            if (monster.state === 'WANDERING') {
                statusEl.innerText = "";
                if (now > monster.timer) {
                    const angle = Math.random() * Math.PI * 2;
                    monster.targetX = Math.cos(angle) * 0.07;
                    monster.targetY = Math.sin(angle) * 0.07;
                    monster.timer = now + 2000;
                }
                if (!isColliding(monster.x + monster.targetX, monster.y + monster.targetY)) {
                    monster.x += monster.targetX;
                    monster.y += monster.targetY;
                } else { monster.timer = 0; }

                if (dist < 8) { 
                    monster.state = 'SPOTTED'; 
                    monster.timer = now + 5000; // Freeze for 5 seconds
                }
            } 
            else if (monster.state === 'SPOTTED') {
                statusEl.innerText = "IT'S STARING AT YOU...";
                if (now > monster.timer) { 
                    monster.state = 'CHASING'; 
                    monster.timer = now + 10000; // Chase for 10 seconds
                }
            } 
            else if (monster.state === 'CHASING') {
                statusEl.innerText = "RUN!!!";
                const angle = Math.atan2(player.y - monster.y, player.x - monster.x);
                monster.x += Math.cos(angle) * monster.speed;
                monster.y += Math.sin(angle) * monster.speed;
                if (now > monster.timer) monster.state = 'WANDERING';
            }

            if (dist < 0.6) { alert("ZAURA GOT YOU"); location.reload(); }
            if (player.x > GRID_SIZE - 1.5) { alert("YOU ESCAPED THE MAZE!"); location.reload(); }
        }

        function draw() {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x * TILE_SIZE, canvas.height / 2 - player.y * TILE_SIZE);

            // Draw Walls
            ctx.fillStyle = '#111';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE + 1, TILE_SIZE + 1);
                    }
                }
            }

            // Draw Entities
            ctx.fillStyle = '#fff'; // Player
            ctx.beginPath(); ctx.arc(player.x * TILE_SIZE, player.y * TILE_SIZE, 12, 0, Math.PI * 2); ctx.fill();
            
            ctx.drawImage(monsterImg, monster.x * TILE_SIZE - 45, monster.y * TILE_SIZE - 45, 90, 90);
            ctx.restore();

            // Flashlight / Fog of War
            const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 450);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'black');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
