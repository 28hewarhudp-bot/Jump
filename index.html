<!DOCTYPE html>
<html>
<head>
    <title>Jumping Spider FPS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="webs">WEBS: 5/5</h1>
        <p id="status">Target Flies to Refill Web</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Setup Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.AmbientLight(0x404040); scene.add(light);
        const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 10, 5); scene.add(sun);

        // World: Floor and Obstacles to climb
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x228b22 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const boxGeo = new THREE.BoxGeometry(4, 10, 4);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        for(let i=0; i<10; i++){
            const wall = new THREE.Mesh(boxGeo, wallMat);
            wall.position.set(Math.random()*40-20, 5, Math.random()*40-20);
            scene.add(wall);
        }

        // Flies
        let flies = [];
        function spawnFly() {
            const fly = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
            fly.position.set(Math.random()*40-20, Math.random()*15 + 2, Math.random()*40-20);
            scene.add(fly);
            flies.push(fly);
        }
        for(let i=0; i<5; i++) spawnFly();

        // Game State
        let webs = 5;
        let isJumping = false;
        let safetyLine = null;
        let lineMesh = null;
        let webAnchor = new THREE.Vector3();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const keys = {};

        camera.position.y = 1.5;

        // Pointer Lock for FPS
        document.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
            }
        });
        camera.rotation.order = 'YXZ';

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            // Movement
            const moveSpeed = 0.1;
            if (keys['KeyW']) camera.translateZ(-moveSpeed);
            if (keys['KeyS']) camera.translateZ(moveSpeed);
            if (keys['KeyA']) camera.translateX(-moveSpeed);
            if (keys['KeyD']) camera.translateX(moveSpeed);

            // Jumping & Web Logic
            if (keys['Space'] && camera.position.y <= 1.6 && !isJumping) {
                if (webs > 0) {
                    webs--;
                    document.getElementById('webs').innerText = `WEBS: ${webs}/5`;
                    webAnchor.copy(camera.position);
                    isJumping = true;
                    velocity.y = 0.2;
                    
                    // Visual Web Line
                    const points = [webAnchor, camera.position];
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                    lineMesh = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xffffff }));
                    scene.add(lineMesh);
                } else {
                    velocity.y = 0.2; // Small jump even without web
                    isJumping = true;
                }
            }

            // Gravity & Safety Line Climbing
            if (isJumping) {
                camera.position.y += velocity.y;
                velocity.y -= 0.01;

                if (lineMesh) {
                    const positions = lineMesh.geometry.attributes.position.array;
                    positions[3] = camera.position.x;
                    positions[4] = camera.position.y;
                    positions[5] = camera.position.z;
                    lineMesh.geometry.attributes.position.needsUpdate = true;

                    // Hold Space to Climb back up
                    if (keys['Space'] && camera.position.y < webAnchor.y) {
                        camera.position.lerp(webAnchor, 0.1);
                    }
                }

                if (camera.position.y <= 1.5) {
                    camera.position.y = 1.5;
                    isJumping = false;
                    if (lineMesh) {
                        scene.remove(lineMesh);
                        lineMesh = null;
                    }
                }
            }

            // Attack Flies (E)
            if (keys['KeyE']) {
                flies.forEach((fly, i) => {
                    if (camera.position.distanceTo(fly.position) < 3) {
                        scene.remove(fly);
                        flies.splice(i, 1);
                        webs = Math.min(5, webs + 1);
                        document.getElementById('webs').innerText = `WEBS: ${webs}/5`;
                        spawnFly();
                    }
                });
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
