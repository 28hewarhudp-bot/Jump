<!DOCTYPE html>
<html>
<head>
    <title>8-BIT STALKER</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        /* This creates the 8-bit pixelated effect */
        canvas { 
            width: 100vw; 
            height: 100vh; 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }
        #ui { 
            position: absolute; top: 10px; left: 10px; color: #00ff00; 
            font-family: 'Courier New', monospace; font-size: 20px;
            text-shadow: 2px 2px black; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>[ SYSTEM: ]</b> <span id="status">WANDERING</span><br>
        <b>[ WASD:  ]</b> MOVE<br>
        <b>[ CLICK: ]</b> START
    </div>

    <script src="https://cloudflare.com"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 1, 40);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Low resolution renderer for 8-bit look
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth / 4, window.innerHeight / 4, false);
        document.body.appendChild(renderer.domElement);

        // --- 8-BIT WORLD ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const point = new THREE.PointLight(0x00ff00, 1, 20); // Retro Green tint
        camera.add(point);
        scene.add(camera);

        // Blocky Maze Walls
        const mazeSize = 25, wallSize = 6;
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const wallGeo = new THREE.BoxGeometry(wallSize, 10, wallSize);

        for(let x=0; x<mazeSize; x++) {
            for(let z=0; z<mazeSize; z++) {
                if(x==0 || x==mazeSize-1 || z==0 || z==mazeSize-1 || (x%3==0 && z%3==0)) {
                    const wall = new THREE.Mesh(wallGeo, wallMat);
                    wall.position.set(x*wallSize - 75, 5, z*wallSize - 75);
                    scene.add(wall);
                }
            }
        }
        
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshPhongMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // --- THE MONSTER (EXACT IMAGE) ---
        const loader = new THREE.TextureLoader();
        // Replacing this URL with the exact monster image link
        const monsterTex = loader.load('https://deepai.org');
        const monsterMat = new THREE.SpriteMaterial({ map: monsterTex });
        const monster = new THREE.Sprite(monsterMat);
        monster.scale.set(6, 10, 1);
        monster.position.set(20, 5, 20);
        monster.userData = { state: "WANDER", target: new THREE.Vector3(20, 5, 20) };
        scene.add(monster);

        // --- PLAYER & CONTROLS ---
        let yaw = 0, playerPos = new THREE.Vector3(0, 2, 0);
        const keys = {};
        document.body.addEventListener('click', () => renderer.domElement.requestPointerLock());
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) yaw -= e.movementX * 0.004;
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Movement
            if(keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
                const move = new THREE.Vector3();
                if(keys['KeyW']) move.z -= 0.15; if(keys['KeyS']) move.z += 0.15;
                if(keys['KeyA']) move.x -= 0.15; if(keys['KeyD']) move.x += 0.15;
                move.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                playerPos.add(move);
            }

            camera.position.copy(playerPos);
            camera.rotation.y = yaw;

            // MONSTER AI
            const dist = monster.position.distanceTo(playerPos);
            const statusLabel = document.getElementById('status');

            if(monster.userData.state === "WANDER") {
                statusLabel.innerText = "WANDERING";
                if(monster.position.distanceTo(monster.userData.target) < 3) {
                    monster.userData.target.set((Math.random()-0.5)*120, 5, (Math.random()-0.5)*120);
                }
                const dir = new THREE.Vector3().subVectors(monster.userData.target, monster.position).normalize();
                monster.position.add(dir.multiplyScalar(0.05));

                if(dist < 20) { monster.userData.state = "FOLLOW"; }
            } 
            else if(monster.userData.state === "FOLLOW") {
                statusLabel.innerText = "FOLLOWING";
                const chaseDir = new THREE.Vector3().subVectors(playerPos, monster.position).normalize();
                monster.position.add(chaseDir.multiplyScalar(0.09));

                if(dist < 1.5) {
                    alert("THE STALKER GOT YOU.");
                    location.reload();
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
