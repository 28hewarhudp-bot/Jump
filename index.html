<!DOCTYPE html>
<html>
<head>
    <title>MAZE SURVIVAL</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: sans-serif; }
        canvas { display: block; background: #000; margin: auto; border: 5px solid #444; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; }
        #freeze { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: yellow; font-size: 60px; font-weight: bold; display: none; text-align: center; }
    </style>
</head>
<body>
    <div id="ui">
        <b>WASD:</b> Move | <b>SHIFT:</b> Run<br>
        <span style="color: #ff4444;"><b>RED DOTS:</b> MONSTERS (FREEZE IF THEY GET CLOSE!)</span>
    </div>
    <div id="freeze">FREEZE!<br><span id="timer">10</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- GAME SETTINGS ---
        let player = { x: canvas.width/2, y: canvas.height/2, size: 15, speed: 3 };
        let monsters = [
            { x: 100, y: 100, size: 20, color: "red", state: "WANDER", timer: 0 },
            { x: canvas.width - 100, y: canvas.height - 100, size: 20, color: "red", state: "WANDER", timer: 0 }
        ];
        
        // --- WALL DATA ---
        let walls = [];
        for(let i=0; i<15; i++) {
            walls.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, w: 100, h: 20 });
            walls.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, w: 20, h: 100 });
        }

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            let moving = false;
            let currentSpeed = keys['ShiftLeft'] ? player.speed * 2 : player.speed;

            if (keys['KeyW']) { player.y -= currentSpeed; moving = true; }
            if (keys['KeyS']) { player.y += currentSpeed; moving = true; }
            if (keys['KeyA']) { player.x -= currentSpeed; moving = true; }
            if (keys['KeyD']) { player.x += currentSpeed; moving = true; }

            // Monster Logic
            let nearMonster = false;
            monsters.forEach(m => {
                let dx = player.x - m.x;
                let dy = player.y - m.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 150) {
                    nearMonster = true;
                    if (moving) {
                        alert("YOU MOVED! RESTARTING...");
                        location.reload();
                    }
                }

                // Simple Wander
                m.x += (Math.random() - 0.5) * 4;
                m.y += (Math.random() - 0.5) * 4;
            });

            document.getElementById("freeze").style.display = nearMonster ? "block" : "none";
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Walls (Green)
            ctx.fillStyle = "#2e7d32";
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // Draw Monsters (Red)
            monsters.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size, 0, Math.PI*2);
                ctx.fill();
            });

            // Draw Player (White)
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
            ctx.fill();
        }

        update();
    </script>
</body>
</html>
