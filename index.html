<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAZE SURVIVAL 2D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; background: #000; margin: auto; }
        #ui { 
            position: absolute; top: 15px; left: 15px; color: white; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; 
            pointer-events: none; border: 2px solid #555;
        }
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #ff0000; font-size: 50px; font-weight: bold; display: none; text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>WASD:</b> Move | <b>Shift:</b> Run<br>
        <span style="color: #ff4444;">Avoid the Stalker!</span>
    </div>
    <div id="msg">CAUGHT!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- PLAYER & MONSTER SETTINGS ---
        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 12, speed: 4 };
        const monsterImg = new Image();
        monsterImg.src = 'https://deepai.org'; // Your exact image

        const monster = {
            x: 100, y: 100,
            width: 80, height: 120, // Proportions matching your image
            speed: 1.5,
            state: "WANDER",
            targetX: 100, targetY: 100
        };

        const walls = [];
        function createMaze() {
            for(let i=0; i<35; i++) {
                walls.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    w: Math.random() > 0.5 ? 120 : 20,
                    h: Math.random() > 0.5 ? 20 : 120
                });
            }
        }
        createMaze();

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            // Player Movement
            const currentSpeed = keys['ShiftLeft'] ? player.speed * 1.8 : player.speed;
            if (keys['KeyW']) player.y -= currentSpeed;
            if (keys['KeyS']) player.y += currentSpeed;
            if (keys['KeyA']) player.x -= currentSpeed;
            if (keys['KeyD']) player.x += currentSpeed;

            // Monster AI
            const dx = player.x - monster.x;
            const dy = player.y - monster.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 300) {
                // Charge Player
                monster.state = "CHASE";
                const angle = Math.atan2(dy, dx);
                monster.x += Math.cos(angle) * (monster.speed * 2);
                monster.y += Math.sin(angle) * (monster.speed * 2);
            } else {
                // Random Wander
                monster.state = "WANDER";
                if (Math.abs(monster.x - monster.targetX) < 5) {
                    monster.targetX = Math.random() * canvas.width;
                    monster.targetY = Math.random() * canvas.height;
                }
                const angle = Math.atan2(monster.targetY - monster.y, monster.targetX - monster.x);
                monster.x += Math.cos(angle) * monster.speed;
                monster.y += Math.sin(angle) * monster.speed;
            }

            // Lose Condition
            if (dist < 40) {
                document.getElementById("msg").style.display = "block";
                setTimeout(() => location.reload(), 2000);
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Maze Walls (Dim Green)
            ctx.fillStyle = "#1b5e20";
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // Draw Player (Small White Dot)
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw EXACT Monster Image
            if (monsterImg.complete) {
                ctx.drawImage(monsterImg, monster.x - monster.width/2, monster.y - monster.height/2, monster.width, monster.height);
            }
        }

        update();
    </script>
</body>
</html>
