<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Pac-Man First Person Fix</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #hud { position: absolute; color: white; top: 10px; left: 10px; font-family: sans-serif; }
</style>
</head>
<body>
<div id="hud">
Score: <span id="score">0</span> | Lives: <span id="lives">3</span>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene,camera,renderer;
let pacman;
let ghosts=[];
let pellets=[];
let powerPellets=[];
let walls=[];
let keys={};

let score=0;
let lives=3;
let scared=false;
let scaredTimer=0;

// ---------- SOUND ----------
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function beep(f=200,d=0.05){
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.frequency.value=f;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime+d);
}

// ---------- MAZE ----------
const map=[];
for(let z=0;z<20;z++){
  map[z]=[];
  for(let x=0;x<20;x++){
    map[z][x]=(x===0||z===0||x===19||z===19||Math.random()<0.15)?1:0;
  }
}

init();
animate();

function init(){
  scene=new THREE.Scene();

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  const light=new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  buildMaze();

  // ---------- PACMAN ----------
  pacman=new THREE.Group();

  let body=new THREE.Mesh(
    new THREE.SphereGeometry(0.4,16,16),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );

  pacman.add(body);
  pacman.position.set(2,0.4,2);
  scene.add(pacman);

  // FIRST PERSON CAMERA
  camera.position.set(0,0.2,0);
  pacman.add(camera);

  // ---------- GHOSTS ----------
  const colors=[0xff0000,0xffb8ff,0x00ffff,0xffa500];

  for(let i=0;i<4;i++){
    let g=new THREE.Group();

    // body (ghost shape)
    let body=new THREE.Mesh(
      new THREE.CylinderGeometry(0.4,0.4,0.6,16),
      new THREE.MeshBasicMaterial({color:colors[i]})
    );
    body.position.y=0.3;

    let head=new THREE.Mesh(
      new THREE.SphereGeometry(0.4,16,16),
      new THREE.MeshBasicMaterial({color:colors[i]})
    );
    head.position.y=0.6;

    // eyes
    let eye1=new THREE.Mesh(new THREE.SphereGeometry(0.05),new THREE.MeshBasicMaterial({color:0xffffff}));
    let eye2=new THREE.Mesh(new THREE.SphereGeometry(0.05),new THREE.MeshBasicMaterial({color:0xffffff}));

    eye1.position.set(0.1,0.65,0.3);
    eye2.position.set(-0.1,0.65,0.3);

    g.add(body);
    g.add(head);
    g.add(eye1);
    g.add(eye2);

    g.position.set(10+i,0,10);
    g.userData={dir:new THREE.Vector3(Math.random(),0,Math.random()).normalize()};

    ghosts.push(g);
    scene.add(g);
  }

  window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
  window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  window.addEventListener('resize',onResize);
}

function buildMaze(){
  for(let z=0;z<map.length;z++){
    for(let x=0;x<map[z].length;x++){

      if(map[z][x]===1){
        let w=new THREE.Mesh(
          new THREE.BoxGeometry(1,1,1),
          new THREE.MeshBasicMaterial({color:0x0033ff})
        );
        w.position.set(x,0.5,z);
        walls.push(w);
        scene.add(w);
      } else {
        let p=new THREE.Mesh(
          new THREE.SphereGeometry(0.1,8,8),
          new THREE.MeshBasicMaterial({color:0xffffff})
        );
        p.position.set(x,0.2,z);
        pellets.push(p);
        scene.add(p);

        if(Math.random()<0.02){
          let pp=new THREE.Mesh(
            new THREE.SphereGeometry(0.2,8,8),
            new THREE.MeshBasicMaterial({color:0xff00ff})
          );
          pp.position.set(x,0.2,z);
          powerPellets.push(pp);
          scene.add(pp);
        }
      }
    }
  }
}

function animate(){
  requestAnimationFrame(animate);

  movePacman();
  moveGhosts();

  if(scared){
    scaredTimer-=0.016;
    if(scaredTimer<=0) scared=false;
  }

  renderer.render(scene,camera);
}

// ---------- PACMAN ----------
function movePacman(){
  let speed=0.08;
  let nx=pacman.position.x;
  let nz=pacman.position.z;

  if(keys['w']) nz-=speed;
  if(keys['s']) nz+=speed;
  if(keys['a']) nx-=speed;
  if(keys['d']) nx+=speed;

  if(!collide(nx,nz)){
    pacman.position.x=nx;
    pacman.position.z=nz;
  }

  // eat pellets
  for(let i=0;i<pellets.length;i++){
    let p=pellets[i];
    if(!p) continue;
    if(dist(pacman.position,p.position)<0.5){
      scene.remove(p);
      pellets[i]=null;
      score++;
      document.getElementById("score").innerText=score;
      beep(300,0.03);
    }
  }

  // power pellets
  for(let i=0;i<powerPellets.length;i++){
    let p=powerPellets[i];
    if(!p) continue;
    if(dist(pacman.position,p.position)<0.6){
      scene.remove(p);
      powerPellets[i]=null;
      scared=true;
      scaredTimer=8;
      beep(600,0.2);
    }
  }
}

// ---------- GHOST AI FIXED ----------
function moveGhosts(){
  ghosts.forEach(g=>{

    let dx=pacman.position.x-g.position.x;
    let dz=pacman.position.z-g.position.z;
    let distVal=Math.sqrt(dx*dx+dz*dz);

    let dir=new THREE.Vector3(dx,0,dz).normalize();

    // ALWAYS MOVE (fix stuck bug)
    if(Math.random()<0.02){
      g.userData.dir.set(
        (Math.random()-0.5),0,(Math.random()-0.5)
      ).normalize();
    }

    let moveDir=g.userData.dir.clone();

    // chase influence
    if(!scared && distVal<10){
      moveDir.lerp(dir,0.05);
    }

    // scared mode
    if(scared){
      moveDir.lerp(dir.clone().negate(),0.3);
    }

    moveDir.normalize();

    let speed=0.05;
    let nx=g.position.x+moveDir.x*speed;
    let nz=g.position.z+moveDir.z*speed;

    if(!collide(nx,nz)){
      g.position.x=nx;
      g.position.z=nz;
    } else {
      g.userData.dir.set(Math.random()-0.5,0,Math.random()-0.5).normalize();
    }

    // collision with player
    if(distVal<0.6 && !scared){
      lives--;
      document.getElementById("lives").innerText=lives;
      pacman.position.set(2,0.4,2);
      beep(120,0.3);

      if(lives<=0){
        alert("Game Over!");
        location.reload();
      }
    }
  });
}

// ---------- COLLISION ----------
function collide(x,z){
  for(let w of walls){
    if(dist({x,z},w.position)<0.7) return true;
  }
  return false;
}

function dist(a,b){
  return Math.sqrt((a.x-b.x)**2+(a.z-b.z)**2);
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}
</script>
</body>
</html>
