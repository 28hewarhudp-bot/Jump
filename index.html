<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Man Showdown</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #4a3728; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { background-color: #87CEEB; border: 10px solid #fff; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 30px; width: 100%; display: flex; justify-content: space-around; font-size: 32px; color: white; pointer-events: none; text-shadow: 3px 3px #000; }
    </style>
</head>
<body>
    <div class="ui">
        <div id="p1-ui">P1: ❤️❤️❤️</div>
        <div id="p2-ui">P2: ❤️❤️❤️</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 700;

        const gravity = 0.6;
        let weapons = [];
        let frameCount = 0;

        class Player {
            constructor(x, y, id, controls) {
                this.x = x; this.y = y;
                this.w = 50; this.h = 80;
                this.dx = 0; this.dy = 0;
                this.id = id;
                this.controls = controls;
                this.lives = 3;
                this.hasWeapon = false;
                this.facing = id === 1 ? 1 : -1;
                this.animFrame = 0; // For Game & Watch jerky movement
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                if (this.facing === -1) ctx.scale(-1, 1);

                ctx.fillStyle = "white";
                // Head
                ctx.beginPath(); ctx.arc(0, -30, 12, 0, Math.PI * 2); ctx.fill();
                
                // Jerky "Game & Watch" Style Animation
                let offset = (Math.abs(this.dx) > 0.1) ? (Math.floor(frameCount / 10) % 2) * 10 : 0;
                
                // Body & Legs
                ctx.fillRect(-10, -15, 20, 35); // Torso
                ctx.fillRect(-15 + offset, 20, 12, 20); // Leg 1
                ctx.fillRect(5 - offset, 20, 12, 20);  // Leg 2
                
                // Arms
                ctx.fillRect(10, -10, 20, 10); // Arm

                if (this.hasWeapon) {
                    // Draw Stop Sign Weapon
                    ctx.fillStyle = "red";
                    ctx.beginPath(); ctx.moveTo(25, -20);
                    for(let i=0; i<8; i++) ctx.lineTo(25 + 25*Math.cos(i*Math.PI/4), -40 + 25*Math.sin(i*Math.PI/4));
                    ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText("STOP", 12, -37);
                }
                ctx.restore();
            }

            update() {
                this.dy += gravity;
                this.x += this.dx;
                this.y += this.dy;

                // Stage Collision (Bigger Arena)
                if (this.y + this.h > 550 && this.x > 150 && this.x < 850 && this.dy > 0) {
                    this.y = 550 - this.h;
                    this.dy = 0;
                    this.onGround = true;
                } else { this.onGround = false; }

                // Borders
                if (this.x < 0) this.x = 0; if (this.x > canvas.width - this.w) this.x = canvas.width - this.w;

                // Pick up weapon
                weapons.forEach((w, i) => {
                    if (Math.abs(this.x - w.x) < 40 && Math.abs(this.y - w.y) < 40) {
                        if ((this.id === 1 && keys[this.controls.pick]) || (this.id === 2 && keys[this.controls.pick])) {
                            this.hasWeapon = true;
                            weapons.splice(i, 1);
                        }
                    }
                });
            }
        }

        const p1 = new Player(200, 400, 1, { left: 'a', right: 'd', jump: ' ', attack: 'f', pick: 'e' });
        const p2 = new Player(750, 400, 2, { left: 'arrowleft', right: 'arrowright', jump: 'arrowup', attack: '2', pick: '1' });

        const keys = {};
        window.addEventListener('keydown', e => {
            let k = e.key.toLowerCase();
            keys[k] = true;
            
            // Attack logic
            if (k === p1.controls.attack && p1.hasWeapon && Math.abs(p1.x - p2.x) < 80) {
                p2.lives--; p2.dx = 15; p2.dy = -10; p1.hasWeapon = false; updateUI();
            }
            if (k === p2.controls.attack && p2.hasWeapon && Math.abs(p2.x - p1.x) < 80) {
                p1.lives--; p1.dx = -15; p1.dy = -10; p2.hasWeapon = false; updateUI();
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function updateUI() {
            document.getElementById('p1-ui').innerText = "P1: " + "❤️".repeat(Math.max(0, p1.lives));
            document.getElementById('p2-ui').innerText = "P2: " + "❤️".repeat(Math.max(0, p2.lives));
            if (p1.lives <= 0) alert("PLAYER 2 WINS!");
            if (p2.lives <= 0) alert("PLAYER 1 WINS!");
        }

        function spawnWeapon() {
            weapons.push({ x: Math.random() * 600 + 200, y: -50, dy: 3 });
        }

        setInterval(spawnWeapon, 5000);

        function gameLoop() {
            frameCount++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Brown Sign Arena
            ctx.fillStyle = "#5d4037"; // Brown background of the sign
            ctx.beginPath();
            ctx.roundRect(150, 450, 700, 150, 30);
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 10;
            ctx.stroke();

            // Draw Weapons
            ctx.fillStyle = "red";
            weapons.forEach(w => {
                w.y += w.dy;
                if (w.y > 510) { w.y = 510; w.dy = 0; }
                ctx.beginPath(); ctx.arc(w.x, w.y, 15, 0, Math.PI*2); ctx.fill();
            });

            // Player 1 Movement
            p1.dx *= 0.8;
            if (keys[p1.controls.left]) { p1.dx = -6; p1.facing = -1; }
            if (keys[p1.controls.right]) { p1.dx = 6; p1.facing = 1; }
            if (keys[p1.controls.jump] && p1.onGround) p1.dy = -15;

            // Player 2 Movement
            p2.dx *= 0.8;
            if (keys[p2.controls.left]) { p2.dx = -6; p2.facing = -1; }
            if (keys[p2.controls.right]) { p2.dx = 6; p2.facing = 1; }
            if (keys[p2.controls.jump] && p2.onGround) p2.dy = -15;

            p1.update(); p2.update();
            p1.draw(); p2.draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
