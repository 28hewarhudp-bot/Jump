        // --- INITIALIZATION ---
        $(document).ready(function() {
            var canvas = document.createElement("canvas");
            canvas.width = 380;
            canvas.height = 420;
            $("#pacman").append(canvas);
            var ctx = canvas.getContext("2d");

            function drawMap() {
                for (var row = 0; row < Pacman.MAP.length; row++) {
                    for (var col = 0; col < Pacman.MAP[row].length; col++) {
                        var tile = Pacman.MAP[row][col];
                        ctx.fillStyle = tile === 0 ? "blue" : "black";
                        if (tile === 0) ctx.fillRect(col * 20, row * 20, 20, 20);
                        if (tile === 1) {
                            ctx.fillStyle = "yellow";
                            ctx.fillRect(col * 20 + 8, row * 20 + 8, 4, 4);
                        }
                    }
                }
            }

            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawMap();
                requestAnimationFrame(update);
            }
            update();
        });
