<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zaura's Maze - Fixed Movement</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); color: white; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        #status { position: fixed; top: 20px; width: 100%; text-align: center; color: red; font-size: 30px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="overlay" onclick="this.style.display='none'; active=true;">
        <h1>ZAURA IS WAITING</h1>
        <p>HOLD MOUSE BUTTON TO MOVE TOWARD CURSOR</p>
        <p>(Or use WASD keys)</p>
        <h2 style="color: red;">CLICK TO START</h2>
    </div>
    <div id="status"></div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let active = false;

        const GRID = 40;
        const SIZE = 120;
        const player = { x: 60, y: 60, speed: 5 };
        const monster = { x: 3000, y: 3000, speed: 3.5, state: 'WANDERING', timer: 0 };
        const monsterImg = new Image();
        monsterImg.src = 'https://ibb.co';

        let walls = [];
        for(let i=0; i<80; i++) {
            walls.push({
                x: Math.random() * 4000,
                y: Math.random() * 4000,
                w: Math.random() > 0.5 ? 5 : 400,
                h: Math.random() > 0.5 ? 400 : 5
            });
        }

        const keys = {};
        let mouse = { down: false, x: 0, y: 0 };
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        window.onmousedown = e => mouse.down = true;
        window.onmouseup = e => mouse.down = false;
        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };

        function update() {
            if(!active) return;

            let oldX = player.x, oldY = player.y;

            // Mouse Movement
            if(mouse.down) {
                let dx = mouse.x - canvas.width/2;
                let dy = mouse.y - canvas.height/2;
                let angle = Math.atan2(dy, dx);
                player.x += Math.cos(angle) * player.speed;
                player.y += Math.sin(angle) * player.speed;
            }
            // WASD Movement
            if(keys.w) player.y -= player.speed;
            if(keys.s) player.y += player.speed;
            if(keys.a) player.x -= player.speed;
            if(keys.d) player.x += player.speed;

            // Simple Collision
            for(let w of walls) {
                if(player.x > w.x && player.x < w.x+w.w && player.y > w.y && player.y < w.y+w.h) {
                    player.x = oldX; player.y = oldY;
                }
            }

            // Monster AI
            let d = Math.hypot(monster.x - player.x, monster.y - player.y);
            let now = Date.now();

            if(monster.state === 'WANDERING') {
                status.innerText = "";
                monster.x += (Math.random()-0.5) * 10;
                monster.y += (Math.random()-0.5) * 10;
                if(d < 500) { monster.state = 'SPOTTED'; monster.timer = now + 5000; }
            } else if(monster.state === 'SPOTTED') {
                status.innerText = "LOOK BEHIND YOU";
                if(now > monster.timer) { monster.state = 'CHASING'; monster.timer = now + 10000; }
            } else {
                status.innerText = "RUN.";
                let a = Math.atan2(player.y - monster.y, player.x - monster.x);
                monster.x += Math.cos(a) * monster.speed;
                monster.y += Math.sin(a) * monster.speed;
                if(now > monster.timer) monster.state = 'WANDERING';
            }

            if(d < 40) { alert("ZAURA GOT YOU"); location.reload(); }
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#050505';
            ctx.fillRect(0,0,canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

            // Walls
            ctx.fillStyle = '#333';
            for(let w of walls) ctx.fillRect(w.x, w.y, w.w, w.h);

            // Exit
            ctx.fillStyle = 'lime';
            ctx.fillRect(3800, 3800, 100, 100);

            // Monster
            ctx.drawImage(monsterImg, monster.x-60, monster.y-60, 120, 120);

            // Player
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();

            ctx.restore();

            // Flashlight
            let g = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, 400);
            g.addColorStop(0, 'transparent'); g.addColorStop(1, 'black');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
