<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Maze Runner - Zaura Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; color: white; font-family: 'Courier New', monospace; }
        canvas { display: block; cursor: crosshair; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
        #status { font-size: 24px; color: red; font-weight: bold; text-transform: uppercase; }
        h1 { color: white; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>
    <div id="overlay" onclick="startGame()">
        <h1>CLICK TO ENTER THE MAZE</h1>
        <p>Use WASD or ARROW KEYS to move</p>
    </div>
    <div id="ui"><div id="status"></div></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const overlay = document.getElementById('overlay');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- GAME SETTINGS ---
        const GRID_SIZE = 51; 
        const TILE_SIZE = 80;
        let gameRunning = false;
        let maze = [];
        
        const player = { x: 1.5, y: 1.5, speed: 0.12 };
        const monster = { 
            x: GRID_SIZE - 2.5, y: GRID_SIZE - 2.5, 
            speed: 0.1, state: 'WANDERING', timer: 0, 
            dir: {x: 0, y: 0} 
        };
        
        const monsterImg = new Image();
        monsterImg.src = 'https://ibb.co'; 

        function startGame() {
            overlay.style.display = 'none';
            gameRunning = true;
        }

        // --- GENERATE MAZE ---
        function initMaze() {
            for (let y = 0; y < GRID_SIZE; y++) {
                maze[y] = Array(GRID_SIZE).fill(1);
            }
            function carve(x, y) {
                maze[y][x] = 0;
                const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < GRID_SIZE-1 && ny > 0 && ny < GRID_SIZE-1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            carve(1, 1);
            maze[GRID_SIZE-2][GRID_SIZE-1] = 2; // Exit
        }
        initMaze();

        // --- CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function isWall(x, y) {
            const margin = 0.2;
            const points = [
                {x: x-margin, y: y-margin}, {x: x+margin, y: y-margin},
                {x: x-margin, y: y+margin}, {x: x+margin, y: y+margin}
            ];
            return points.some(p => maze[Math.floor(p.y)][Math.floor(p.x)] === 1);
        }

        // --- UPDATE & DRAW ---
        function loop() {
            if (gameRunning) {
                let nextX = player.x, nextY = player.y;
                if (keys['KeyW'] || keys['ArrowUp']) nextY -= player.speed;
                if (keys['KeyS'] || keys['ArrowDown']) nextY += player.speed;
                if (keys['KeyA'] || keys['ArrowLeft']) nextX -= player.speed;
                if (keys['KeyD'] || keys['ArrowRight']) nextX += player.speed;

                if (!isWall(nextX, player.y)) player.x = nextX;
                if (!isWall(player.x, nextY)) player.y = nextY;

                // AI Logic (as requested)
                const dist = Math.hypot(monster.x - player.x, monster.y - player.y);
                const now = Date.now();

                if (monster.state === 'WANDERING') {
                    statusText.innerText = "";
                    if (Math.random() < 0.02) {
                        const d = [[0,-1],[0,1],[-1,0],[1,0]][Math.floor(Math.random()*4)];
                        monster.dir = {x: d[0], y: d[1]};
                    }
                    let mx = monster.x + monster.dir.x * 0.05;
                    let my = monster.y + monster.dir.y * 0.05;
                    if (!isWall(mx, my)) { monster.x = mx; monster.y = my; }
                    if (dist < 8) { monster.state = 'SPOTTED'; monster.timer = now + 5000; }
                } 
                else if (monster.state === 'SPOTTED') {
                    statusText.innerText = "IT IS WATCHING...";
                    if (now > monster.timer) { monster.state = 'CHASING'; monster.timer = now + 10000; }
                } 
                else if (monster.state === 'CHASING') {
                    statusText.innerText = "RUN!!";
                    const angle = Math.atan2(player.y - monster.y, player.x - monster.x);
                    monster.x += Math.cos(angle) * monster.speed;
                    monster.y += Math.sin(angle) * monster.speed;
                    if (now > monster.timer) monster.state = 'WANDERING';
                }

                if (dist < 0.4) { alert("CAUGHT BY ZAURA"); location.reload(); }
                if (player.x > GRID_SIZE - 1) { alert("YOU ESCAPED!"); location.reload(); }
            }

            // Drawing
            ctx.fillStyle = 'black';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2 - player.x*TILE_SIZE, canvas.height/2 - player.y*TILE_SIZE);

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#0a0a0a';
                        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#222';
                        ctx.strokeRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
            
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(player.x*TILE_SIZE, player.y*TILE_SIZE, 10, 0, Math.PI*2); ctx.fill();
            ctx.drawImage(monsterImg, monster.x*TILE_SIZE-TILE_SIZE/2, monster.y*TILE_SIZE-TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
            ctx.restore();

            // Darkness/Flashlight
            const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 20, canvas.width/2, canvas.height/2, 400);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'black');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width, canvas.height);

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
