<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Man Smash</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #87CEEB; font-family: sans-serif; overflow: hidden; }
        canvas { background-color: #87CEEB; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <div id="p1-stats">P1: 0%</div>
        <div id="p2-stats">P2: 0%</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        const gravity = 0.5;

        class Player {
            constructor(x, y, id, controls) {
                this.x = x; this.y = y;
                this.width = 40; this.height = 60;
                this.dx = 0; this.dy = 0;
                this.onGround = false;
                this.id = id;
                this.controls = controls;
                this.damage = 0;
                this.hasWeapon = false;
            }

            draw() {
                ctx.strokeStyle = "black";
                ctx.lineWidth = 4;
                ctx.beginPath();
                // Draw "Sign Man" head
                ctx.arc(this.x + 20, this.y + 10, 8, 0, Math.PI * 2);
                // Body
                ctx.moveTo(this.x + 20, this.y + 18); ctx.lineTo(this.x + 20, this.y + 40);
                // Arms
                ctx.moveTo(this.x + 20, this.y + 25); ctx.lineTo(this.x + 5, this.y + 35);
                ctx.moveTo(this.x + 20, this.y + 25); ctx.lineTo(this.x + 35, this.y + 35);
                // Legs
                ctx.moveTo(this.x + 20, this.y + 40); ctx.lineTo(this.x + 10, this.y + 60);
                ctx.moveTo(this.x + 20, this.y + 40); ctx.lineTo(this.x + 30, this.y + 60);
                ctx.stroke();

                if (this.hasWeapon) {
                    ctx.fillStyle = "red";
                    ctx.beginPath(); ctx.arc(this.x + 40, this.y + 25, 12, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = "8px Arial"; ctx.fillText("STOP", this.x + 30, this.y + 28);
                }
            }

            update() {
                this.dy += gravity;
                this.x += this.dx;
                this.y += this.dy;

                // Collision with the "Yellow Sign" platform
                if (this.y + this.height > 450 && this.x > 250 && this.x < 550 && this.dy > 0) {
                    this.y = 450 - this.height;
                    this.dy = 0;
                    this.onGround = true;
                } else { this.onGround = false; }

                // KO logic
                if (this.x < -50 || this.x > 850 || this.y > 650) {
                    this.x = this.id === 1 ? 300 : 500;
                    this.y = 200;
                    this.damage = 0;
                    updateUI();
                }
            }
        }

        const p1 = new Player(300, 200, 1, { left: 'a', right: 'd', jump: ' ', attack: 'f', pick: 'e' });
        const p2 = new Player(500, 200, 2, { left: 'arrowleft', right: 'arrowright', jump: 'arrowup', attack: '2', pick: '1' });

        const keys = {};
        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            keys[key] = true;
            // Handling picking up weapons and attacking
            if (key === p1.controls.pick) p1.hasWeapon = true;
            if (key === p2.controls.pick) p2.hasWeapon = true;
            if (key === p1.controls.attack && p1.hasWeapon) { p2.damage += 10; p2.dx = 10; updateUI(); }
            if (key === p2.controls.attack && p2.hasWeapon) { p1.damage += 10; p1.dx = -10; updateUI(); }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function updateUI() {
            document.getElementById('p1-stats').innerText = `P1: ${p1.damage}%`;
            document.getElementById('p2-stats').innerText = `P2: ${p2.damage}%`;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the "Walking Sign" stage
            ctx.fillStyle = "#FFD700";
            ctx.save();
            ctx.translate(400, 450);
            ctx.rotate(45 * Math.PI / 180);
            ctx.fillRect(-150, -150, 300, 300);
            ctx.restore();

            // P1 Input
            p1.dx = 0;
            if (keys[p1.controls.left]) p1.dx = -5;
            if (keys[p1.controls.right]) p1.dx = 5;
            if (keys[p1.controls.jump] && p1.onGround) p1.dy = -12;

            // P2 Input
            p2.dx = 0;
            if (keys[p2.controls.left]) p2.dx = -5;
            if (keys[p2.controls.right]) p2.dx = 5;
            if (keys[p2.controls.jump] && p2.onGround) p2.dy = -12;

            p1.update(); p2.update();
            p1.draw(); p2.draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
