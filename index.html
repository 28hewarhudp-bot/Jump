<!DOCTYPE html>
<html>
<head>
    <title>Jumping Spider: High Visibility Garden</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.7; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="web-count">WEBS: 5/5</h2>
        <p><b>E:</b> Set Safety Web | <b>SPACE:</b> Jump/Climb | <b>F:</b> Attack</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Bright sky color
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ENHANCED LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 1.5); // Very bright ambient light
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 2); 
        sun.position.set(10, 50, 10); 
        scene.add(sun);

        // --- GARDEN WORLD ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x4e3b31 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        function createPlant(x, z) {
            const h = Math.random() * 8 + 4;
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.2, h), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
            stem.position.set(x, h/2, z);
            scene.add(stem);

            const leaf = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 2, 0, Math.PI*2, 0, 0.2), new THREE.MeshStandardMaterial({ color: 0x32CD32, side: THREE.DoubleSide }));
            leaf.position.set(x, h, z);
            leaf.rotation.x = Math.random() * 0.5;
            scene.add(leaf);
        }
        for(let i=0; i<40; i++) createPlant(Math.random()*80-40, Math.random()*80-40);

        // --- PHYSICS & CONTROLS ---
        let webs = 5, isJumping = false, safetyLine = null, anchor = new THREE.Vector3(), velocityY = 0;
        const keys = {};

        camera.position.set(0, 1.5, 5); // Start above the origin to avoid clipping

        document.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x -= e.movementY * 0.003;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });
        camera.rotation.order = 'YXZ';
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            const speed = 0.2;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);

            if (keys['KeyE'] && !safetyLine && webs > 0) {
                webs--;
                document.getElementById('web-count').innerText = `WEBS: ${webs}/5`;
                anchor.copy(camera.position);
                safetyLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([anchor, camera.position]), new THREE.LineBasicMaterial({ color: 0xffffff }));
                scene.add(safetyLine);
            }

            if (keys['Space'] && !isJumping) { isJumping = true; velocityY = 0.3; }

            if (isJumping || camera.position.y > 1.5) {
                camera.position.y += velocityY;
                velocityY -= 0.015;

                if (safetyLine && keys['Space']) {
                    camera.position.lerp(anchor, 0.1);
                    velocityY = 0;
                }

                if (safetyLine) safetyLine.geometry.setFromPoints([anchor, camera.position]);

                if (camera.position.y <= 1.5) {
                    camera.position.y = 1.5; isJumping = false; velocityY = 0;
                    if (safetyLine) { scene.remove(safetyLine); safetyLine = null; }
                }

                if (camera.position.y < -10) { alert("Missed the jump! Game Over."); location.reload(); }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
