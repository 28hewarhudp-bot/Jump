<!DOCTYPE html>
<html>
<head>
    <title>The Backrooms: Infinite Maze</title>
    <style>
        body { background: #1a1a14; color: #d4d4aa; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #e2d192; cursor: none; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0,0,0,0.8); pointer-events: none; }
        .ui { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px 2px black; }
        .hum { display: none; } /* Add a low hum sound if you have one */
    </style>
</head>
<body>
    <div class="ui">
        LEVEL 0: "THE LOBBY"<br>
        COORD: <span id="coords">0, 0</span><br>
        <small>Run. Don't look back.</small>
    </div>
    <div class="vignette"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const coordDisplay = document.getElementById('coords');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 60;
const WALL_COLOR = "#bcae76"; // Yellowish Backrooms wall
const FLOOR_COLOR = "#e2d192"; // Dirty carpet color
const PLAYER_COLOR = "#222";

let player = { x: 0, y: 0 };
let keys = {};

// Use a seedable-style hash to make the world consistent as you move back and forth
function isWall(x, y) {
    // This creates a "noise" pattern that looks like a maze
    // Using prime numbers to create a pseudo-random grid
    if (x === 0 && y === 0) return false; // Starting point is always clear
    let val = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return (val - Math.floor(val)) > 0.75; // 25% chance of a wall
}

function draw() {
    ctx.fillStyle = FLOOR_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const offsetX = canvas.width / 2 - player.x;
    const offsetY = canvas.height / 2 - player.y;

    // Only draw what's visible on screen
    const startCol = Math.floor((player.x - canvas.width / 2) / TILE_SIZE);
    const endCol = Math.ceil((player.x + canvas.width / 2) / TILE_SIZE);
    const startRow = Math.floor((player.y - canvas.height / 2) / TILE_SIZE);
    const endRow = Math.ceil((player.y + canvas.height / 2) / TILE_SIZE);

    for (let row = startRow; row <= endRow; row++) {
        for (let col = startCol; col <= endCol; col++) {
            if (isWall(col, row)) {
                ctx.fillStyle = WALL_COLOR;
                ctx.fillRect(col * TILE_SIZE + offsetX, row * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
                
                // Add a small "border" to walls for depth
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.strokeRect(col * TILE_SIZE + offsetX, row * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Draw Player (Shadowy figure)
    ctx.fillStyle = PLAYER_COLOR;
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 10, 0, Math.PI * 2);
    ctx.fill();

    // Update UI
    coordDisplay.innerText = `${Math.floor(player.x / TILE_SIZE)}, ${Math.floor(player.y / TILE_SIZE)}`;

    update();
    requestAnimationFrame(draw);
}

function update() {
    let speed = 4;
    let nextX = player.x;
    let nextY = player.y;

    if (keys['w'] || keys['W']) nextY -= speed;
    if (keys['s'] || keys['S']) nextY += speed;
    if (keys['a'] || keys['A']) nextX -= speed;
    if (keys['d'] || keys['D']) nextX += speed;

    // Collision detection: Check the 4 corners of the player
    if (!checkCollision(nextX, nextY)) {
        player.x = nextX;
        player.y = nextY;
    }
}

function checkCollision(nx, ny) {
    const pSize = 8; // Player hit-box size
    const corners = [
        {x: nx - pSize, y: ny - pSize},
        {x: nx + pSize, y: ny - pSize},
        {x: nx - pSize, y: ny + pSize},
        {x: nx + pSize, y: ny + pSize}
    ];

    for (let c of corners) {
        let col = Math.floor(c.x / TILE_SIZE);
        let row = Math.floor(c.y / TILE_SIZE);
        if (isWall(col, row)) return true;
    }
    return false;
}

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

draw();
</script>
</body>
</html>
