<!DOCTYPE html>
<html>
<head>
    <title>Infinite IKEA - The Ghost Exit Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; text-shadow: 2px 2px #000; z-index: 100; pointer-events: none; }
        #timer-box { font-size: 24px; font-weight: bold; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="timer-box"><span id="status">DAY</span>: <span id="countdown">60</span>s</div>
        <p>F: Drag | E: Toggle Lamp | Move through items if stuck!</p>
    </div>
    <canvas id="gameCanvas"></canvas>
    <canvas id="lightCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const lightCanvas = document.getElementById('lightCanvas');
const lctx = lightCanvas.getContext('2d');

function resize() {
    canvas.width = lightCanvas.width = window.innerWidth;
    canvas.height = lightCanvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// --- SETTINGS ---
const CHUNK_SIZE = 800;
const CYCLE_TIME = 60; // 1 minute
let worldTime = 0;
let isDay = true;

let player = { x: 0, y: 0, size: 15, speed: 5 };
let camera = { x: 0, y: 0 };
let furniture = [];
let employees = [];
let chunksGenerated = new Set();
let keys = {};
let heldItem = null;

// --- GENERATION ---
function generateChunk(cx, cy) {
    const chunkId = `${cx},${cy}`;
    if (chunksGenerated.has(chunkId)) return;
    
    for (let i = 0; i < 12; i++) {
        let isLamp = Math.random() < 0.2;
        let type = isLamp ? {w:20, h:20, c:'#FFD700', isLamp: true, lit: false} : {w: 100, h: 60, c: '#5d4037', isLamp: false};
        furniture.push({
            x: cx * CHUNK_SIZE + Math.random() * CHUNK_SIZE,
            y: cy * CHUNK_SIZE + Math.random() * CHUNK_SIZE,
            w: type.w, h: type.h, color: type.c, isLamp: type.isLamp, lit: type.lit
        });
    }

    for (let i = 0; i < 2; i++) {
        employees.push({ 
            x: cx * CHUNK_SIZE + 400, y: cy * CHUNK_SIZE + 400, 
            vx: Math.random()*2-1, vy: Math.random()*2-1, 
            speed: 1.5 
        });
    }
    chunksGenerated.add(chunkId);
}

// COLLISION LOGIC
function isOverlapping(x, y, size) {
    for (let f of furniture) {
        if (f === heldItem) continue;
        if (x + size > f.x - f.w/2 && x - size < f.x + f.w/2 && 
            y + size > f.y - f.h/2 && y - size < f.y + f.h/2) return true;
    }
    return false;
}

window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'e') {
        let target = heldItem || furniture.find(f => f.isLamp && Math.hypot(player.x - f.x, player.y - f.y) < 60);
        if (target && target.isLamp) target.lit = !target.lit;
    }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function update() {
    worldTime += 1/60;
    let timeLeft = Math.floor(CYCLE_TIME - (worldTime % CYCLE_TIME));
    isDay = (Math.floor(worldTime / CYCLE_TIME) % 2 === 0);
    
    document.getElementById('status').innerText = isDay ? "DAY" : "NIGHT";
    document.getElementById('status').style.color = isDay ? "yellow" : "red";
    document.getElementById('countdown').innerText = timeLeft;

    // Grab Logic
    if (keys['f']) {
        if (!heldItem) heldItem = furniture.find(f => Math.hypot(player.x - f.x, player.y - f.y) < 70);
        if (heldItem) { heldItem.x = player.x; heldItem.y = player.y; }
    } else heldItem = null;

    // Movement with "Anti-Stuck" logic
    let nx = player.x, ny = player.y;
    if (keys['w']) ny -= player.speed; if (keys['s']) ny += player.speed;
    if (keys['a']) nx -= player.speed; if (keys['d']) nx += player.speed;
    
    // If the player is ALREADY inside something, let them move freely to exit.
    // Only block movement if the NEXT position is a collision and the CURRENT isn't.
    let currentlyStuck = isOverlapping(player.x, player.y, player.size);
    
    if (currentlyStuck) {
        player.x = nx;
        player.y = ny;
    } else {
        if (!isOverlapping(nx, player.y, player.size)) player.x = nx;
        if (!isOverlapping(player.x, ny, player.size)) player.y = ny;
    }

    camera.x = player.x - canvas.width/2; camera.y = player.y - canvas.height/2;

    let cX = Math.floor(player.x/CHUNK_SIZE), cY = Math.floor(player.y/CHUNK_SIZE);
    for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) generateChunk(cX+x, cY+y);

    employees.forEach(emp => {
        let dx = player.x - emp.x, dy = player.y - emp.y, d = Math.hypot(dx, dy);
        if (!isDay) {
            let mvX = (dx/d)*3.2, mvY = (dy/d)*3.2;
            if (!isOverlapping(emp.x + mvX, emp.y, 10)) emp.x += mvX;
            if (!isOverlapping(emp.x, emp.y + mvY, 10)) emp.y += mvY;
            if (d < 20) location.reload();
        } else {
            if (!isOverlapping(emp.x + emp.vx, emp.y, 10)) emp.x += emp.vx;
            if (!isOverlapping(emp.x, emp.y + emp.vy, 10)) emp.y += emp.vy;
            if (Math.random() < 0.01) { emp.vx = Math.random()*2-1; emp.vy = Math.random()*2-1; }
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#9e9e9e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    furniture.forEach(f => {
        if (f.isLamp) {
            ctx.fillStyle = "#333"; ctx.fillRect(f.x-5, f.y-5, 10, 40);
            ctx.fillStyle = f.lit ? "#FFF700" : "#555"; 
            ctx.beginPath(); ctx.arc(f.x, f.y-10, 15, 0, Math.PI, true); ctx.fill();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(f.x - f.w/2 + 4, f.y - f.h/2 + 4, f.w, f.h);
            ctx.fillStyle = f.color; ctx.fillRect(f.x - f.w/2, f.y - f.h/2, f.w, f.h);
            ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 2; ctx.strokeRect(f.x - f.w/2, f.y - f.h/2, f.w, f.h);
        }
    });

    employees.forEach(emp => {
        ctx.fillStyle = "#ffeb3b"; ctx.fillRect(emp.x-12, emp.y-12, 24, 24);
        ctx.fillStyle = "#ffe0b2"; ctx.fillRect(emp.x-8, emp.y-30, 16, 18);
    });

    ctx.fillStyle = "#2196f3"; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    lctx.clearRect(0,0,canvas.width, canvas.height);
    if (!isDay) {
        lctx.fillStyle = "rgba(0, 0, 15, 0.97)";
        lctx.fillRect(0,0,canvas.width, canvas.height);
        lctx.globalCompositeOperation = 'destination-out';
        furniture.forEach(f => {
            if (f.isLamp && f.lit) {
                let grad = lctx.createRadialGradient(f.x-camera.x, f.y-camera.y, 10, f.x-camera.x, f.y-camera.y, 280);
                grad.addColorStop(0, "rgba(255,255,255,1)");
                grad.addColorStop(1, "rgba(255,255,255,0)");
                lctx.fillStyle = grad;
                lctx.beginPath(); lctx.arc(f.x-camera.x, f.y-camera.y, 280, 0, Math.PI*2); lctx.fill();
            }
        });
        lctx.globalCompositeOperation = 'source-over';
    }
}
update();
</script>
</body>
</html>
