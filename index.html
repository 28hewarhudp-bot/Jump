<!DOCTYPE html>
<html>
<head>
    <title>Spider Prototype 0.1</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="web-count">WEBS: 5/5</h2>
        <p><b>WASD:</b> Move | <b>SPACE:</b> Jump/Reel | <b>E:</b> Safety Web | <b>F:</b> Attack</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // Ground & Hills
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x4a7c44 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 3D Conical Plants (from image)
        function createPlant(x, z) {
            const h = Math.random() * 5 + 3;
            const geo = new THREE.ConeGeometry(2, h, 12);
            const mat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            const plant = new THREE.Mesh(geo, mat);
            plant.position.set(x, h/2, z);
            scene.add(plant);
        }
        for(let i=0; i<40; i++) createPlant(Math.random()*100-50, Math.random()*100-50);

        // The Spider Model
        const spider = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        body.scale.set(1, 0.6, 1.5);
        spider.add(body);
        
        // Red mark on back
        const mark = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0x990000 }));
        mark.position.set(0, 0.2, 0.3);
        spider.add(mark);
        scene.add(spider);

        // Game State
        let webs = 5, isJumping = false, safetyLine = null, anchor = new THREE.Vector3(), velocityY = 0;
        const keys = {};

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            // Movement logic
            const speed = 0.15;
            if (keys['KeyW']) { spider.translateZ(speed); }
            if (keys['KeyS']) { spider.translateZ(-speed); }
            if (keys['KeyA']) { spider.rotation.y += 0.05; }
            if (keys['KeyD']) { spider.rotation.y -= 0.05; }

            // Camera follows spider
            const relativeCameraOffset = new THREE.Vector3(0, 2, -5);
            const cameraOffset = relativeCameraOffset.applyMatrix4(spider.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(spider.position);

            // Safety Web (E)
            if (keys['KeyE'] && !safetyLine && webs > 0) {
                webs--;
                document.getElementById('web-count').innerText = `WEBS: ${webs}/5`;
                anchor.copy(spider.position);
                safetyLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([anchor, spider.position]), new THREE.LineBasicMaterial({ color: 0xffffff }));
                scene.add(safetyLine);
            }

            // Jump
            if (keys['Space'] && !isJumping) { isJumping = true; velocityY = 0.25; }

            if (isJumping || spider.position.y > 0) {
                spider.position.y += velocityY;
                velocityY -= 0.01;

                if (safetyLine && keys['Space']) {
                    spider.position.lerp(anchor, 0.1);
                    velocityY = 0;
                }

                if (safetyLine) safetyLine.geometry.setFromPoints([anchor, spider.position]);

                if (spider.position.y <= 0) {
                    spider.position.y = 0; isJumping = false; velocityY = 0;
                    if (safetyLine) { scene.remove(safetyLine); safetyLine = null; }
                }

                if (spider.position.y < -10) { alert("Game Over"); location.reload(); }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
