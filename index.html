<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>8-Bit Maze Chase</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  font-family: monospace;
}
canvas {
  image-rendering: pixelated;
  border: 4px solid #222;
}
#info {
  position: absolute;
  top: 10px;
  left: 10px;
}
</style>
</head>
<body>
<div id="info">Arrow keys to move | Reach green exit</div>
<canvas id="game" width="640" height="640"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 20;
const cols = canvas.width / tileSize;
const rows = canvas.height / tileSize;

// 0 = path, 1 = wall, 2 = exit
let maze = [];
let player, monster;
let level = 1;

function generateMaze() {
  maze = [];
  for (let y = 0; y < rows; y++) {
    let row = [];
    for (let x = 0; x < cols; x++) {
      if (x === 0 || y === 0 || x === cols - 1 || y === rows - 1) {
        row.push(1);
      } else {
        row.push(Math.random() < 0.22 ? 1 : 0);
      }
    }
    maze.push(row);
  }

  // ensure start & exit
  maze[1][1] = 0;
  maze[rows - 2][cols - 2] = 2;

  player = { x: 1, y: 1 };
  monster = { x: cols - 2, y: 1 };
}

function drawMaze() {
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (maze[y][x] === 1) ctx.fillStyle = "#111";
      else if (maze[y][x] === 2) ctx.fillStyle = "#0f0";
      else ctx.fillStyle = "#000";

      ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
    }
  }
}

function drawPlayer() {
  ctx.fillStyle = "#00f";
  ctx.fillRect(player.x * tileSize, player.y * tileSize, tileSize, tileSize);
}

function drawMonster() {
  ctx.fillStyle = "#f00";
  ctx.fillRect(monster.x * tileSize, monster.y * tileSize, tileSize, tileSize);
}

function movePlayer(dx, dy) {
  let nx = player.x + dx;
  let ny = player.y + dy;
  if (maze[ny][nx] !== 1) {
    player.x = nx;
    player.y = ny;
  }

  if (maze[player.y][player.x] === 2) {
    level++;
    generateMaze();
  }
}

// Monster AI (always tracks player)
function moveMonster() {
  let dx = player.x - monster.x;
  let dy = player.y - monster.y;

  let stepX = Math.sign(dx);
  let stepY = Math.sign(dy);

  // try horizontal first
  if (maze[monster.y][monster.x + stepX] !== 1) {
    monster.x += stepX;
  } else if (maze[monster.y + stepY][monster.x] !== 1) {
    monster.y += stepY;
  }

  // collision
  if (monster.x === player.x && monster.y === player.y) {
    alert("Caught! Restarting level");
    generateMaze();
  }
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMaze();
  drawPlayer();
  drawMonster();
  moveMonster();

  requestAnimationFrame(loop);
}

window.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") movePlayer(0, -1);
  if (e.key === "ArrowDown") movePlayer(0, 1);
  if (e.key === "ArrowLeft") movePlayer(-1, 0);
  if (e.key === "ArrowRight") movePlayer(1, 0);
});

generateMaze();
loop();
</script>
</body>
</html>
