<!DOCTYPE html>
<html>
<head>
    <title>Maze Runner: The Stalker</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: red; pointer-events: none; text-shadow: 2px 2px black; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(139, 0, 0, 0.8); padding: 40px; display: none; text-align: center; border: 3px solid black; }
        #flashlight-warning { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #444; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>STATUS: <span id="status">WANDERING</span></h2>
        <p>FIND THE EXIT... IF YOU CAN.</p>
    </div>
    <div id="msg"><h1>CAUGHT</h1><p>The smile was the last thing you saw.</p></div>
    <div id="flashlight-warning">FLASHLIGHT IS ALWAYS ON. USE WASD TO RUN.</div>

    <script src="https://unpkg.com"></script>
    <script>
        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. THE DARKNESS (Flashlight) ---
        const flashlight = new THREE.SpotLight(0xffffff, 2, 40, Math.PI / 6, 0.5);
        flashlight.position.set(0, 1.6, 0);
        scene.add(flashlight);
        scene.add(flashlight.target);

        // Ambient darkness
        scene.add(new THREE.AmbientLight(0x050505));

        // --- 3. THE MAZE GENERATION ---
        const mazeSize = 40; // Massive maze
        const wallSize = 4;
        const maze = [];
        const wallGeo = new THREE.BoxGeometry(wallSize, wallSize, wallSize);
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x111111 });

        // Simple random maze generation
        for(let x = 0; x < mazeSize; x++) {
            maze[x] = [];
            for(let z = 0; z < mazeSize; z++) {
                // Borders and random inner walls
                if (x === 0 || x === mazeSize - 1 || z === 0 || z === mazeSize - 1 || Math.random() > 0.8) {
                    const wall = new THREE.Mesh(wallGeo, wallMat);
                    wall.position.set(x * wallSize - (mazeSize * wallSize / 2), wallSize / 2, z * wallSize - (mazeSize * wallSize / 2));
                    scene.add(wall);
                    maze[x][z] = 1; // Wall
                } else {
                    maze[x][z] = 0; // Path
                }
            }
        }
        maze[1][1] = 0; // Starting area

        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshPhongMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 4. THE MONSTER ---
        const monsterTex = new THREE.TextureLoader().load('https://imgur.com'); // Using a placeholder that looks like your image
        const monsterMat = new THREE.SpriteMaterial({ map: monsterTex });
        const monster = new THREE.Sprite(monsterMat);
        monster.scale.set(3, 3, 1);
        monster.position.set(20, 1.5, 20);
        scene.add(monster);

        // Monster AI States: "WANDER", "PEEK", "CHASE"
        let monsterState = "WANDER";
        let peekTimer = 0;
        let monsterVel = new THREE.Vector3();
        let monsterSpeed = 0.03;

        // --- 5. PLAYER CONTROLS ---
        let yaw = 0, pitch = 0;
        document.body.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));
            }
        });

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const playerPos = new THREE.Vector3( -mazeSize * wallSize / 2 + 4, 1.6, -mazeSize * wallSize / 2 + 4 );

        // --- 6. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Player movement
            const move = new THREE.Vector3();
            if (keys['KeyW']) move.z -= 0.1;
            if (keys['KeyS']) move.z += 0.1;
            if (keys['KeyA']) move.x -= 0.1;
            if (keys['KeyD']) move.x += 0.1;
            
            const playerRot = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0));
            move.applyQuaternion(playerRot);
            
            // Simple Wall Collision
            const nextX = playerPos.x + move.x;
            const nextZ = playerPos.z + move.z;
            const gridX = Math.round((nextX + (mazeSize * wallSize / 2)) / wallSize);
            const gridZ = Math.round((nextZ + (mazeSize * wallSize / 2)) / wallSize);

            if (maze[gridX] && maze[gridX][gridZ] === 0) {
                playerPos.add(move);
            }

            camera.position.copy(playerPos);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');

            // Flashlight follows camera
            flashlight.position.copy(playerPos);
            const targetPos = playerPos.clone().add(new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion));
            flashlight.target.position.copy(targetPos);

            // MONSTER AI LOGIC
            const distToPlayer = monster.position.distanceTo(playerPos);
            const canSeePlayer = distToPlayer < 25; // Simple LOS simulation

            if (monsterState === "WANDER") {
                document.getElementById('status').innerText = "WANDERING";
                // Randomly drift
                monster.position.x += Math.sin(Date.now() * 0.001) * 0.02;
                monster.position.z += Math.cos(Date.now() * 0.001) * 0.02;
                
                if (canSeePlayer) {
                    monsterState = "PEEK";
                    peekTimer = Date.now();
                }
            } 
            else if (monsterState === "PEEK") {
                document.getElementById('status').innerText = "WATCHING...";
                // Look at player but don't move
                if (Date.now() - peekTimer > 10000) { // 10 seconds
                    monsterState = "CHASE";
                }
            } 
            else if (monsterState === "CHASE") {
                document.getElementById('status').innerText = "RUN.";
                const chaseDir = new THREE.Vector3().subVectors(playerPos, monster.position).normalize();
                monster.position.add(chaseDir.multiplyScalar(monsterSpeed));
                
                // If it loses you (gets far away), go back to wander
                if (distToPlayer > 40) {
                    monsterState = "WANDER";
                    monsterSpeed += 0.01; // Gets smarter/faster every time it loses you
                }
            }

            // Game Over
            if (distToPlayer < 1.5) {
                document.getElementById('msg').style.display = 'block';
                setTimeout(() => location.reload(), 3000);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
