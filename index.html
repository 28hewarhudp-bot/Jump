<!DOCTYPE html>
<html>
<head>
    <title>Jumping Spider: Garden Hunter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; text-shadow: 2px 2px #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="web-count">WEBS: 5/5</h2>
        <p id="hint">E: Use Web Safety Line | F: Attack | SPACE: Jump/Climb</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2e1a); // Dark garden mood
        scene.fog = new THREE.Fog(0x1a2e1a, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambient = new THREE.AmbientLight(0x404040, 2); scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(10, 20, 10); scene.add(sun);

        // --- GARDEN WORLD ---
        // Ground (Soil/Moss)
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Giant Leaves and Stems
        function createLeaf(x, z, h) {
            const group = new THREE.Group();
            // Stem
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, h), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
            stem.position.y = h/2;
            group.add(stem);
            // Leaf
            const leaf = new THREE.Mesh(new THREE.SphereGeometry(5, 8, 2, 0, Math.PI*2, 0, 0.1), new THREE.MeshStandardMaterial({ color: 0x4a7c44, side: THREE.DoubleSide }));
            leaf.position.y = h;
            leaf.rotation.x = Math.random();
            group.add(leaf);
            
            group.position.set(x, 0, z);
            scene.add(group);
            return group;
        }

        for(let i=0; i<30; i++) createLeaf(Math.random()*100-50, Math.random()*100-50, Math.random()*10+5);

        // --- GAME LOGIC ---
        let webs = 5;
        let isJumping = false;
        let safetyLine = null;
        let anchor = new THREE.Vector3();
        let velocity = new THREE.Vector3();
        const keys = {};

        camera.position.set(0, 0.5, 0);

        // FPS Controls
        document.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x -= e.movementY * 0.003;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });
        camera.rotation.order = 'YXZ';

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            // WASD Movement
            const speed = 0.15;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);

            // Web Safety Line (E)
            if (keys['KeyE'] && !safetyLine && webs > 0) {
                webs--;
                document.getElementById('web-count').innerText = `WEBS: ${webs}/5`;
                anchor.copy(camera.position);
                const mat = new THREE.LineBasicMaterial({ color: 0xffffff });
                const geo = new THREE.BufferGeometry().setFromPoints([anchor, camera.position]);
                safetyLine = new THREE.Line(geo, mat);
                scene.add(safetyLine);
            }

            // Free Jump (Space)
            if (keys['Space'] && !isJumping) {
                isJumping = true;
                velocity.y = 0.25;
            }

            // Physics & Climbing
            if (isJumping || camera.position.y > 0.5) {
                camera.position.y += velocity.y;
                velocity.y -= 0.01; // Gravity

                // If safety line exists, Hold Space to Climb
                if (safetyLine && keys['Space']) {
                    camera.position.lerp(anchor, 0.1);
                    velocity.y = 0;
                }

                // Update Line Visual
                if (safetyLine) {
                    safetyLine.geometry.setFromPoints([anchor, camera.position]);
                }

                // Hit ground
                if (camera.position.y <= 0.5) {
                    camera.position.y = 0.5;
                    isJumping = false;
                    velocity.y = 0;
                    if (safetyLine) { scene.remove(safetyLine); safetyLine = null; }
                }

                // Death Logic (Fall without line)
                if (camera.position.y < -5) {
                    alert("You fell! No safety line!");
                    location.reload();
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
