<!DOCTYPE html>
<html>
<head>
    <title>Backrooms - The Stalker</title>
    <style>
        body { margin: 0; background: #1a1a14; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { background: #e2d192; display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #d4d4aa;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; cursor: pointer; text-align: center;
        }
        .ui { position: absolute; top: 10px; left: 10px; color: #444; pointer-events: none; z-index: 5; line-height: 1.5; }
        #status { color: #800; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startGame()">
        <h1>THE BACKROOMS</h1>
        <p>A monster is wandering these halls.</p>
        <p><b>CLICK TO ENTER</b></p>
    </div>

    <div class="ui">
        COORD: <span id="coords">0, 0</span><br>
        STATUS: <span id="status">CALM</span>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const statusDisplay = document.getElementById('status');

let gameRunning = false;
let player = { x: 40, y: 40 };
let keys = {};
const TILE_SIZE = 80;

// MONSTER LOGIC
let monster = { x: 400, y: 400, vx: 2, vy: 0, state: 'WANDER', chaseTimer: 0 };

function startGame() {
    overlay.style.display = 'none';
    gameRunning = true;
    window.focus();
}

function isWall(x, y) {
    if (Math.abs(x) <= 1 && Math.abs(y) <= 1) return false;
    let val = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return (val - Math.floor(val)) > 0.82;
}

// Raycasting to check line of sight
function hasLineOfSight(x1, y1, x2, y2) {
    let dx = x2 - x1;
    let dy = y2 - y1;
    let distance = Math.sqrt(dx*dx + dy*dy);
    let steps = distance / 10;
    for(let i=0; i<steps; i++) {
        let checkX = x1 + (dx * (i/steps));
        let checkY = y1 + (dy * (i/steps));
        if(isWall(Math.floor(checkX/TILE_SIZE), Math.floor(checkY/TILE_SIZE))) return false;
    }
    return true;
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function update() {
    if (!gameRunning) return;

    // 1. Player Movement
    let pSpeed = 4.5;
    let dx = 0, dy = 0;
    if (keys['w']) dy -= pSpeed;
    if (keys['s']) dy += pSpeed;
    if (keys['a']) dx -= pSpeed;
    if (keys['d']) dx += pSpeed;

    if (!checkCollision(player.x + dx, player.y)) player.x += dx;
    if (!checkCollision(player.x, player.y + dy)) player.y += dy;

    // 2. Monster AI
    let distToPlayer = Math.sqrt((monster.x-player.x)**2 + (monster.y-player.y)**2);
    let canSeePlayer = hasLineOfSight(monster.x, monster.y, player.x, player.y);

    if (canSeePlayer && distToPlayer < 500) {
        monster.state = 'CHASE';
        monster.chaseTimer = 600; // 10 seconds at 60fps
    }

    if (monster.state === 'CHASE') {
        statusDisplay.innerText = "RUN!!";
        statusDisplay.style.color = "#f00";
        // Move towards player
        let angle = Math.atan2(player.y - monster.y, player.x - monster.x);
        let mx = Math.cos(angle) * 3.5;
        let my = Math.sin(angle) * 3.5;
        
        if (!checkCollision(monster.x + mx, monster.y, 15)) monster.x += mx;
        if (!checkCollision(monster.x, monster.y + my, 15)) monster.y += my;

        monster.chaseTimer--;
        if (monster.chaseTimer <= 0) monster.state = 'WANDER';
    } else {
        statusDisplay.innerText = "CALM";
        statusDisplay.style.color = "#444";
        // Wander logic: simple movement + bounce
        if (checkCollision(monster.x + monster.vx, monster.y + monster.vy, 15)) {
            monster.vx = (Math.random() - 0.5) * 4;
            monster.vy = (Math.random() - 0.5) * 4;
        }
        monster.x += monster.vx;
        monster.y += monster.vy;
    }

    // 3. Death Condition
    if (distToPlayer < 25) {
        alert("THE SMILER CAUGHT YOU");
        player = {x: 40, y: 40};
        monster = {x: 600, y: 600, vx: 2, vy: 0, state: 'WANDER', chaseTimer: 0};
    }
}

function checkCollision(nx, ny, p = 10) {
    const corners = [{x:nx-p,y:ny-p},{x:nx+p,y:ny-p},{x:nx-p,y:ny+p},{x:nx+p,y:ny+p}];
    for (let c of corners) {
        if (isWall(Math.floor(c.x / TILE_SIZE), Math.floor(c.y / TILE_SIZE))) return true;
    }
    return false;
}

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = "#e2d192";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const offsetX = canvas.width / 2 - player.x;
    const offsetY = canvas.height / 2 - player.y;

    // Draw Walls
    const startCol = Math.floor((player.x - canvas.width / 2) / TILE_SIZE);
    const endCol = Math.ceil((player.x + canvas.width / 2) / TILE_SIZE);
    const startRow = Math.floor((player.y - canvas.height / 2) / TILE_SIZE);
    const endRow = Math.ceil((player.y + canvas.height / 2) / TILE_SIZE);

    for (let row = startRow; row <= endRow; row++) {
        for (let col = startCol; col <= endCol; col++) {
            if (isWall(col, row)) {
                ctx.fillStyle = "#bcae76";
                ctx.fillRect(col * TILE_SIZE + offsetX, row * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Draw Monster (Black silhouette with red eyes)
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(monster.x + offsetX, monster.y + offsetY, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#f00"; // Eyes
    ctx.fillRect(monster.x + offsetX - 8, monster.y + offsetY - 5, 4, 4);
    ctx.fillRect(monster.x + offsetX + 4, monster.y + offsetY - 5, 4, 4);

    // Draw Player
    ctx.fillStyle = "rgba(0,0,255,0.5)";
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 10, 0, Math.PI * 2);
    ctx.fill();

    document.getElementById('coords').innerText = `${Math.floor(player.x / TILE_SIZE)}, ${Math.floor(player.y / TILE_SIZE)}`;
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
