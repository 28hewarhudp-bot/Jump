<!DOCTYPE html>
<html>
<head>
    <title>Jumping Spider Droid: Garden Mission</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { background: #3d2b1f; border: 8px solid #fff; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        #ui { position: absolute; top: 20px; color: #0f0; text-align: center; pointer-events: none; }
        #camera-ui { position: absolute; bottom: 20px; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="web-display">WEBS: 5/5</h2>
        <p><b>WASD:</b> Move | <b>SPACE:</b> Jump/Reel | <b>E:</b> Anchor Web | <b>V:</b> Toggle View</p>
    </div>
    <div id="camera-ui">FEED: TOP-DOWN_SURVEILLANCE</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 650;

        let webs = 5, flies = [], leaves = [], safetyWeb = null, frame = 0, isFirstPerson = false;
        const player = { x: 450, y: 325, r: 18, isJumping: false, scale: 1, onLeaf: true };

        // Generate the Garden
        for(let i=0; i<12; i++) {
            leaves.push({ x: Math.random() * 800 + 50, y: Math.random() * 550 + 50, r: Math.random() * 30 + 70 });
        }
        function spawnFly() { flies.push({ x: Math.random() * 850, y: Math.random() * 600 }); }
        for(let i=0; i<4; i++) spawnFly();

        const keys = {};
        window.onkeydown = (e) => {
            let k = e.key.toLowerCase(); keys[k] = true;
            if(k === 'e' && !safetyWeb && webs > 0) { webs--; safetyWeb = { x: player.x, y: player.y }; updateUI(); }
            if(k === 'v') { isFirstPerson = !isFirstPerson; document.getElementById('camera-ui').innerText = isFirstPerson ? "FEED: SPIDER_EYE_CAM" : "FEED: TOP-DOWN_SURVEILLANCE"; }
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function updateUI() { document.getElementById('web-display').innerText = `WEBS: ${webs}/5`; }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;

            // Visual effect for First Person
            if(isFirstPerson) { ctx.fillStyle = "#112211"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.globalAlpha = 0.5; }

            // Leaves
            ctx.fillStyle = "#224422";
            leaves.forEach(l => { ctx.beginPath(); ctx.arc(l.x, l.y, l.r, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = "#44aa44"; ctx.lineWidth = 4; ctx.stroke(); });

            // Safety Line
            if(safetyWeb) {
                ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 3; ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.moveTo(safetyWeb.x, safetyWeb.y); ctx.lineTo(player.x, player.y); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(safetyWeb.x, safetyWeb.y, 6, 0, Math.PI*2); ctx.fill();
            }

            // Flies
            ctx.fillStyle = "yellow";
            flies.forEach(f => { ctx.beginPath(); ctx.arc(f.x, f.y, 6, 0, Math.PI*2); ctx.fill(); });

            // Movement & Mechanics
            let s = 4.5;
            if(keys['a']) player.x -= s; if(keys['d']) player.x += s; if(keys['w']) player.y -= s; if(keys['s']) player.y += s;

            if(keys[' '] && !player.isJumping) {
                player.isJumping = true; player.scale = 1.8;
                setTimeout(() => { player.isJumping = false; player.scale = 1; checkLanding(); }, 600);
            }

            if(keys[' '] && safetyWeb && !player.onLeaf) { player.x += (safetyWeb.x - player.x) * 0.12; player.y += (safetyWeb.y - player.y) * 0.12; }

            if(keys['f']) {
                flies.forEach((f, i) => { if(Math.hypot(player.x - f.x, player.y - f.y) < 40) { flies.splice(i, 1); webs = Math.min(5, webs + 1); updateUI(); spawnFly(); }});
            }

            function checkLanding() {
                let hit = leaves.some(l => Math.hypot(player.x - l.x, player.y - l.y) < l.r);
                player.onLeaf = hit;
                if(!hit && !safetyWeb) { alert("MISSION FAILED: DROID CRITICAL FALL"); location.reload(); }
                else if (hit) safetyWeb = null;
            }

            // Draw "Spider Droid"
            ctx.save();
            ctx.translate(player.x, player.y); ctx.scale(player.scale, player.scale);
            ctx.fillStyle = "#333"; ctx.fillRect(-15, -10, 30, 20); // Metal Body
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(8, -4, 4, 0, Math.PI*2); ctx.fill(); // Droid Eyes
            ctx.arc(-8, -4, 4, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#555"; ctx.lineWidth = 3;
            for(let i=0; i<8; i++){
                let ang = (i * Math.PI / 4) + (frame * 0.15);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*22, Math.sin(ang)*22); ctx.stroke();
            }
            ctx.restore();
            ctx.globalAlpha = 1.0;
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
