<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8-Bit Maze Quest</title>
<style>
body {
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}
canvas {
    image-rendering: pixelated;
    border:4px solid white;
}
</style>
</head>
<body>
<canvas id="game" width="960" height="640"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE = 32;
const ROWS = 21;
const COLS = 31;

// ===== MAZE GENERATION (DFS) =====
const maze = Array.from({length:ROWS},()=>Array(COLS).fill(1));

function carve(x,y){
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    dirs.sort(()=>Math.random()-0.5);

    for(const d of dirs){
        const nx=x+d[0]*2;
        const ny=y+d[1]*2;

        if(nx>0 && ny>0 && nx<COLS-1 && ny<ROWS-1 && maze[ny][nx]===1){
            maze[ny-d[1]][nx-d[0]]=0;
            maze[ny][nx]=0;
            carve(nx,ny);
        }
    }
}

maze[1][1]=0;
carve(1,1);

// ===== PLAYER =====
const player={x:1,y:1};

// ===== KEYS =====
const keys=[];
for(let i=0;i<8;i++){
    let x,y;
    do{
        x=Math.floor(Math.random()*COLS);
        y=Math.floor(Math.random()*ROWS);
    }while(maze[y][x]!==0);
    keys.push({x,y});
}

let collected=0;

// ===== MONSTERS (CREEPERS) =====
const monsters=[];
for(let i=0;i<4;i++){
    monsters.push({
        x:COLS-2-i,
        y:ROWS-2,
        mode:"chase",
        color:"green"
    });
}

let boss={x:Math.floor(COLS/2),y:Math.floor(ROWS/2)};

// ===== INPUT =====
const input={};
window.addEventListener("keydown",e=>input[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>input[e.key.toLowerCase()]=false);

function move(x,y,dx,dy){
    const nx=x+dx, ny=y+dy;
    if(maze[ny] && maze[ny][nx]===0){
        return {x:nx,y:ny};
    }
    return {x,y};
}

// ===== DISTANCE MAP (BFS) =====
let dist=[];
function buildDistances(){
    dist=Array.from({length:ROWS},()=>Array(COLS).fill(Infinity));
    const q=[[player.x,player.y]];
    dist[player.y][player.x]=0;

    while(q.length){
        const [x,y]=q.shift();
        const dirs=[[1,0],[-1,0],[0,1],[0,-1]];

        for(const d of dirs){
            const nx=x+d[0], ny=y+d[1];
            if(maze[ny] && maze[ny][nx]===0 && dist[ny][nx]===Infinity){
                dist[ny][nx]=dist[y][x]+1;
                q.push([nx,ny]);
            }
        }
    }
}

// ===== MONSTER AI (PAC-MAN STYLE) =====
function moveMonster(m,i){
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];

    let best=null;
    let bestScore=Infinity;

    const scatterTargets=[
        {x:1,y:1},
        {x:COLS-2,y:1},
        {x:1,y:ROWS-2},
        {x:COLS-2,y:ROWS-2}
    ];

    const target = (m.mode==="scatter") ? scatterTargets[i] : player;

    for(const d of dirs){
        const nx=m.x+d[0], ny=m.y+d[1];
        if(!maze[ny] || maze[ny][nx]!==0) continue;

        const score = Math.abs(target.x-nx)+Math.abs(target.y-ny);

        if(dist[ny] && dist[ny][nx]<bestScore){
            bestScore=dist[ny][nx];
            best=d;
        }
    }

    if(best){
        m.x+=best[0];
        m.y+=best[1];
    }

    if(Math.random()<0.005){
        m.mode = (m.mode==="chase") ? "scatter" : "chase";
    }
}

let gameOver=false, win=false;

function update(){
    if(gameOver||win) return;

    if(input["w"]||input["arrowup"]) player.y--;
    if(input["s"]||input["arrowdown"]) player.y++;
    if(input["a"]||input["arrowleft"]) player.x--;
    if(input["d"]||input["arrowright"]) player.x++;

    if(maze[player.y][player.x]===1){
        player.x=1;player.y=1;
    }

    keys.forEach((k,i)=>{
        if(k.x===player.x && k.y===player.y){
            keys.splice(i,1);
            collected++;
        }
    });

    buildDistances();

    monsters.forEach((m,i)=>moveMonster(m,i));

    monsters.forEach(m=>{
        if(m.x===player.x && m.y===player.y) gameOver=true;
    });

    if(keys.length===0) win=true;
}

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // maze
    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            if(maze[y][x]===1){
                ctx.fillStyle="#1a2cff";
                ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
            }
        }
    }

    // keys
    keys.forEach(k=>{
        ctx.fillStyle="gold";
        ctx.fillRect(k.x*TILE+12,k.y*TILE+10,8,12);
        ctx.fillRect(k.x*TILE+16,k.y*TILE+6,4,4);
    });

    // player (boy square with legs)
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x*TILE+8,player.y*TILE+8,16,16);

    ctx.beginPath();
    ctx.strokeStyle="cyan";
    ctx.moveTo(player.x*TILE+10,player.y*TILE+24);
    ctx.lineTo(player.x*TILE+10,player.y*TILE+30);
    ctx.moveTo(player.x*TILE+22,player.y*TILE+24);
    ctx.lineTo(player.x*TILE+22,player.y*TILE+30);
    ctx.stroke();

    // creeper monsters
    monsters.forEach(m=>{
        ctx.fillStyle="lime";
        ctx.fillRect(m.x*TILE+6,m.y*TILE+6,20,20);

        ctx.fillStyle="black";
        ctx.fillRect(m.x*TILE+10,m.y*TILE+10,4,4);
        ctx.fillRect(m.x*TILE+18,m.y*TILE+10,4,4);
        ctx.fillRect(m.x*TILE+12,m.y*TILE+18,8,4);
    });

    // boss creeper
    ctx.fillStyle="darkgreen";
    ctx.fillRect(boss.x*TILE,boss.y*TILE,32,32);

    ctx.fillStyle="black";
    ctx.fillRect(boss.x*TILE+8,boss.y*TILE+10,6,6);
    ctx.fillRect(boss.x*TILE+18,boss.y*TILE+10,6,6);
    ctx.fillRect(boss.x*TILE+12,boss.y*TILE+22,10,4);

    // UI
    ctx.fillStyle="white";
    ctx.font="18px monospace";
    ctx.fillText("Keys: "+collected,10,20);

    if(gameOver){
        ctx.font="50px monospace";
        ctx.fillText("GAME OVER",260,320);
    }
    if(win){
        ctx.font="50px monospace";
        ctx.fillText("YOU WIN",280,320);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
