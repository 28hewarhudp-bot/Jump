<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Jumping Spider - Visual Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px;
            pointer-events: none;
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; text-shadow: 1px 1px 2px black; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>Webs:</b> <span id="webCount">5</span>/5 | <b>Score:</b> <span id="score">0</span>
    </div>
    <div id="instructions">Click screen to Look & Move | WASD to Walk | Space to Jump | E for Web</div>

    <script src="https://cloudflare.com"></script>
    <script>
        // --- 1. THE WORLD SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights (Essential so things aren't black)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); 
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // --- 2. THE SPIDER ---
        const spider = new THREE.Group();
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), bodyMat);
        head.position.z = 0.2;
        const abdomen = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12), bodyMat);
        abdomen.scale.set(1, 0.8, 1.2);
        
        // Big Spider Eyes
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
        eyeL.position.set(0.1, 0.1, 0.35);
        const eyeR = eyeL.clone(); eyeR.position.x = -0.1;
        
        spider.add(head, abdomen, eyeL, eyeR);
        spider.position.set(0, 2, 0); // Start on the leaf
        scene.add(spider);

        // --- 3. ENVIRONMENT ---
        // Ground (Dirt)
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshPhongMaterial({ color: 0x3b2516 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Leaves on Stems
        const platforms = [];
        function createLeaf(x, z, h) {
            const group = new THREE.Group();
            // Stem
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, h), new THREE.MeshPhongMaterial({color: 0x4d3926}));
            stem.position.y = h/2;
            // Leaf
            const leaf = new THREE.Mesh(new THREE.CircleGeometry(1.5, 32), new THREE.MeshPhongMaterial({color: 0x2e7d32, side: THREE.DoubleSide}));
            leaf.rotation.x = Math.PI/2;
            leaf.position.y = h;
            
            group.add(stem, leaf);
            group.position.set(x, 0, z);
            scene.add(group);
            platforms.push(leaf); // We collide with the leaf part
        }

        createLeaf(0, 0, 1.5); // Starting leaf
        for(let i=0; i<15; i++) {
            createLeaf((Math.random()-0.5)*30, (Math.random()-0.5)*30, 1 + Math.random()*5);
        }

        // --- 4. CONTROLS ---
        let yaw = 0, pitch = 0;
        document.body.addEventListener('click', () => document.body.requestPointerLock());
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.003;
                pitch -= e.movementY * 0.003;
                pitch = Math.max(-0.8, Math.min(0.2, pitch)); // Limit looking up/down
            }
        });

        const keys = {};
        let isJumping = false, velocityY = 0, webs = 5, activeWeb = null;
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (activeWeb) { // Climb up web
                    spider.position.copy(activeWeb.topPos);
                    scene.remove(activeWeb.line);
                    activeWeb = null;
                    isJumping = false;
                } else if (!isJumping) {
                    velocityY = 0.2;
                    isJumping = true;
                }
            }
            if (e.code === 'KeyE' && isJumping && webs > 0 && !activeWeb) {
                webs--;
                document.getElementById('webCount').innerText = webs;
                const lineGeo = new THREE.BufferGeometry().setFromPoints([spider.position.clone(), new THREE.Vector3(spider.position.x, 15, spider.position.z)]);
                const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color: 0xffffff}));
                scene.add(line);
                activeWeb = { line: line, topPos: spider.position.clone() };
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- 5. GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Move Spider
            spider.rotation.y = yaw;
            const dir = new THREE.Vector3();
            if (keys['KeyW']) dir.z -= 0.1;
            if (keys['KeyS']) dir.z += 0.1;
            if (keys['KeyA']) dir.x -= 0.1;
            if (keys['KeyD']) dir.x += 0.1;
            dir.applyQuaternion(spider.quaternion);
            spider.position.add(dir);

            // Gravity
            if (isJumping) {
                spider.position.y += velocityY;
                velocityY -= 0.01;

                // Web Catch
                if (activeWeb && spider.position.y < activeWeb.topPos.y - 2) {
                    spider.position.y = activeWeb.topPos.y - 2;
                    velocityY = 0;
                }

                // Landing
                platforms.forEach(p => {
                    let worldPos = new THREE.Vector3(); p.getWorldPosition(worldPos);
                    let dist = new THREE.Vector2(spider.position.x - worldPos.x, spider.position.z - worldPos.z).length();
                    if (dist < 1.5 && velocityY < 0 && Math.abs(spider.position.y - worldPos.y) < 0.2) {
                        isJumping = false;
                        velocityY = 0;
                        spider.position.y = worldPos.y + 0.1;
                        if (activeWeb) { scene.remove(activeWeb.line); activeWeb = null; }
                    }
                });

                // Death
                if (spider.position.y < 0.1) {
                    spider.position.set(0, 2, 0); // Reset
                    isJumping = false;
                }
            }

            // CAMERA FIX: Position camera behind the spider
            const relativeCameraOffset = new THREE.Vector3(0, 1.5, 4);
            const cameraOffset = relativeCameraOffset.applyMatrix4(spider.matrixWorld);
            camera.position.x = cameraOffset.x;
            camera.position.y = cameraOffset.y;
            camera.position.z = cameraOffset.z;
            camera.lookAt(spider.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
