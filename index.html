<!DOCTYPE html>
<html>
<head>
    <title>Escape the Infinite IKEA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #e0e0e0; }
        #ui { position: absolute; top: 10; left: 10; color: white; text-shadow: 1px 1px black; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>SCP-3008 Lite</h2>
        <p>WASD to Move | F to pick up furniture</p>
        <p id="timer">Time: 0s</p>
        <p id="status" style="font-weight:bold; color: yellow;">DAY TIME</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Game State
let player = { x: canvas.width/2, y: canvas.height/2, size: 20, color: 'blue', speed: 4 };
let furniture = [{ x: 300, y: 300, w: 60, h: 40, held: false }];
let food = [{ x: 500, y: 200, size: 10, eaten: false }];
let employee = { x: 100, y: 100, size: 25, speed: 2 };
let keys = {};
let gameTime = 0;
let isDay = true;

// Input Handling
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function update() {
    // 1. Timer Logic (2 mins = 120 seconds)
    gameTime += 1/60; 
    let cycleTime = Math.floor(gameTime) % 240; 
    isDay = cycleTime < 120; // First 120s is Day, next 120s is Night

    document.getElementById('timer').innerText = `Time: ${Math.floor(gameTime)}s`;
    document.getElementById('status').innerText = isDay ? "DAY TIME (Safe)" : "NIGHT TIME (Run!)";
    document.getElementById('status').style.color = isDay ? "yellow" : "red";

    // 2. Player Movement (WASD)
    if (keys['w']) player.y -= player.speed;
    if (keys['s']) player.y += player.speed;
    if (keys['a']) player.x -= player.speed;
    if (keys['d']) player.x += player.speed;

    // 3. Pick up Furniture (F)
    furniture.forEach(f => {
        let dist = Math.hypot(player.x - f.x, player.y - f.y);
        if (keys['f'] && dist < 50) {
            f.x = player.x;
            f.y = player.y;
        }
    });

    // 4. Employee AI
    if (!isDay) {
        let dx = player.x - employee.x;
        let dy = player.y - employee.y;
        let angle = Math.atan2(dy, dx);
        employee.x += Math.cos(angle) * employee.speed;
        employee.y += Math.sin(angle) * employee.speed;

        // Collision Check
        if (Math.hypot(player.x - employee.x, player.y - employee.y) < 20) {
            alert("The store is closed. Game Over!");
            location.reload();
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Set Night Overlay
    ctx.fillStyle = isDay ? "#e0e0e0" : "#222244";
    ctx.fillRect(0,0, canvas.width, canvas.height);

    // Draw Furniture (Brown Boxes)
    ctx.fillStyle = "#8B4513";
    furniture.forEach(f => ctx.fillRect(f.x - f.w/2, f.y - f.h/2, f.w, f.h));

    // Draw Food (Red Circles)
    ctx.fillStyle = "red";
    food.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
        ctx.fill();
    });

    // Draw Employee (Yellow Shirt)
    if (!isDay) {
        ctx.fillStyle = "yellow";
        ctx.fillRect(employee.x - 12, employee.y - 12, 25, 25);
    }

    // Draw Player
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();
}

update();
</script>
</body>
</html>
