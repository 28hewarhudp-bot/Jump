<!DOCTYPE html>
<html>
<head>
    <title>THE MAZE: 3D STALKER</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; background: white; padding: 15px; border-radius: 8px; z-index: 100; border: 2px solid black; }
        #msg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: red; display: none; align-items: center; justify-content: center; z-index: 200; font-size: 50px; }
    </style>
</head>
<body>
    <div id="ui">
        <b>WASD:</b> Move | <b>Click:</b> Look<br>
        <b>STATUS:</b> <span id="status">WANDERING</span>
    </div>
    <div id="msg">CAUGHT</div>

    <!-- The 3D Engine -->
    <script src="https://cloudflare.com"></script>
    <script>
        // 1. SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. BRIGHT LIGHTING (Fixes the black screen)
        const light = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(light);

        // 3. MAZE (Visible Grey Walls)
        const wallGeo = new THREE.BoxGeometry(10, 15, 10);
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
        const mazeSize = 20;

        for (let x = 0; x < mazeSize; x++) {
            for (let z = 0; z < mazeSize; z++) {
                if (x === 0 || x === mazeSize - 1 || z === 0 || z === mazeSize - 1 || (x % 3 === 0 && z % 3 === 0)) {
                    const wall = new THREE.Mesh(wallGeo, wallMat);
                    wall.position.set(x * 15 - 150, 7.5, z * 15 - 150);
                    scene.add(wall);
                }
            }
        }
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({color: 0x000000}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // 4. THE MONSTER (Exact Image)
        const loader = new THREE.TextureLoader();
        const monsterTex = loader.load('https://deepai.org');
        const monsterMat = new THREE.SpriteMaterial({ map: monsterTex });
        const monster = new THREE.Sprite(monsterMat);
        monster.scale.set(7, 10, 1);
        monster.position.set(30, 5, 30);
        monster.userData = { state: "WANDER", target: new THREE.Vector3(30, 5, 30) };
        scene.add(monster);

        // 5. PLAYER & CONTROLS
        let yaw = 0;
        let playerPos = new THREE.Vector3(0, 5, 0); // Start high so you see everything
        const keys = {};

        document.body.addEventListener('click', () => renderer.domElement.requestPointerLock());
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) yaw -= e.movementX * 0.003;
        });

        // 6. GAME LOOP
        function animate() {
            requestAnimationFrame(animate);

            // Movement relative to where you look
            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
                const move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 0.2;
                if (keys['KeyS']) move.z += 0.2;
                if (keys['KeyA']) move.x -= 0.2;
                if (keys['KeyD']) move.x += 0.2;
                move.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                playerPos.add(move);
            }

            camera.position.copy(playerPos);
            camera.rotation.y = yaw;

            // MONSTER AI
            const dist = monster.position.distanceTo(playerPos);
            if (monster.userData.state === "WANDER") {
                document.getElementById('status').innerText = "WANDERING";
                if (monster.position.distanceTo(monster.userData.target) < 4) {
                    monster.userData.target.set((Math.random()-0.5)*150, 5, (Math.random()-0.5)*150);
                }
                const dir = new THREE.Vector3().subVectors(monster.userData.target, monster.position).normalize();
                monster.position.add(dir.multiplyScalar(0.08));

                if (dist < 30) monster.userData.state = "CHASE";
            } else {
                document.getElementById('status').innerText = "CHASING!";
                const dir = new THREE.Vector3().subVectors(playerPos, monster.position).normalize();
                monster.position.add(dir.multiplyScalar(0.15));

                if (dist < 2) {
                    document.getElementById('msg').style.display = 'flex';
                    setTimeout(() => location.reload(), 2000);
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
