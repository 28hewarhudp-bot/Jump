<!DOCTYPE html>
<html>
<head>
    <title>SCP-3008: 3D Infinite IKEA</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px black; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; color: white; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="status">DAY</h1>
        <p>WASD: Move | Click: Lock Mouse | F: Grab Furniture | E: Flashlight</p>
        <p id="hunger">Hunger: 10/10</p>
    </div>
    <div id="crosshair">+</div>

    <!-- Load Three.js Engine -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

<script type="module">
import * as THREE from 'three';

// --- INITIAL SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
const ambientLight = new THREE.AmbientLight(0x404040, 2); // Soft white light
scene.add(ambientLight);

const flashLight = new THREE.SpotLight(0xffffff, 100);
flashLight.angle = Math.PI / 6;
flashLight.penumbra = 0.3;
flashLight.position.set(0, 1, 0);
scene.add(flashLight);
scene.add(flashLight.target);

// --- WORLD GLOBALS ---
let isDay = true;
let timer = 0;
let hunger = 10;
let heldItem = null;
const furniture = [];
const employees = [];

// --- FLOOR ---
const floorGeo = new THREE.PlaneGeometry(2000, 2000);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// --- SPAWN FURNITURE ---
function spawnItem(x, z) {
    const h = 1 + Math.random() * 2;
    const geo = new THREE.BoxGeometry(2, h, 2);
    const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
    const item = new THREE.Mesh(geo, mat);
    item.position.set(x, h/2, z);
    item.castShadow = true;
    scene.add(item);
    furniture.push(item);
}

for(let i=0; i<100; i++) spawnItem(Math.random()*200 - 100, Math.random()*200 - 100);

// --- EMPLOYEE ---
const empGeo = new THREE.BoxGeometry(1, 4, 1);
const empMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
const employee = new THREE.Mesh(empGeo, empMat);
employee.position.set(20, 2, 20);
scene.add(employee);

// --- CONTROLS ---
let keys = {};
document.addEventListener('keydown', (e) => keys[e.code] = true);
document.addEventListener('keyup', (e) => keys[e.code] = false);
document.addEventListener('click', () => document.body.requestPointerLock());

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement) {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x -= e.movementY * 0.002;
        camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
    }
});

// --- INTERACTION ---
window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyF') {
        if (heldItem) {
            heldItem = null;
        } else {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(furniture);
            if (hits.length > 0 && hits[0].distance < 5) {
                heldItem = hits[0].object;
                hunger -= 1;
                document.getElementById('hunger').innerText = `Hunger: ${hunger}/10`;
            }
        }
    }
    if (e.code === 'KeyE') flashLight.visible = !flashLight.visible;
});

// --- GAME LOOP ---
function update() {
    timer += 1/60;
    if (timer > 60) {
        isDay = !isDay;
        timer = 0;
    }

    // Day/Night Visuals
    const status = document.getElementById('status');
    status.innerText = isDay ? "DAY" : "NIGHT";
    status.style.color = isDay ? "yellow" : "red";
    ambientLight.intensity = isDay ? 2 : 0.05;

    // Movement
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

    if (keys['KeyW']) camera.position.addScaledVector(dir, 0.2);
    if (keys['KeyS']) camera.position.addScaledVector(dir, -0.2);
    if (keys['KeyA']) camera.position.addScaledVector(side, 0.2);
    if (keys['KeyD']) camera.position.addScaledVector(side, -0.2);
    camera.position.y = 1.7; // Head height

    // Flashlight & Held Item
    flashLight.position.copy(camera.position);
    const targetPos = new THREE.Vector3();
    camera.getWorldDirection(targetPos);
    flashLight.target.position.copy(camera.position).add(targetPos);

    if (heldItem) {
        heldItem.position.copy(camera.position).addScaledVector(targetPos, 4);
    }

    // Employee AI
    if (!isDay) {
        const empDir = new THREE.Vector3().subVectors(camera.position, employee.position).normalize();
        employee.position.addScaledVector(empDir, 0.1);
        if (camera.position.distanceTo(employee.position) < 2) location.reload();
    }

    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

camera.rotation.order = 'YXZ';
update();
</script>
</body>
</html>
