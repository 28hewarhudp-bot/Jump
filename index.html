<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Pac-Man Prototype</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #info { position: absolute; color: white; top: 10px; left: 10px; font-family: sans-serif; }
</style>
</head>
<body>
<div id="info">WASD to move</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene, camera, renderer;
let pacman;
let ghosts = [];
let keys = {};

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 10, 10);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 5);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 50),
    new THREE.MeshBasicMaterial({ color: 0x111111 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // Pacman
  pacman = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffff00 })
  );
  pacman.position.y = 0.5;
  scene.add(pacman);

  // Ghosts
  for (let i = 0; i < 4; i++) {
    let ghost = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    ghost.position.set((Math.random()-0.5)*10, 0.5, (Math.random()-0.5)*10);
    scene.add(ghost);
    ghosts.push(ghost);
  }

  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  movePacman();
  moveGhosts();

  renderer.render(scene, camera);
}

function movePacman() {
  const speed = 0.1;
  if (keys['w']) pacman.position.z -= speed;
  if (keys['s']) pacman.position.z += speed;
  if (keys['a']) pacman.position.x -= speed;
  if (keys['d']) pacman.position.x += speed;

  camera.position.x = pacman.position.x;
  camera.position.z = pacman.position.z + 10;
  camera.lookAt(pacman.position);
}

function moveGhosts() {
  ghosts.forEach(g => {
    const dx = pacman.position.x - g.position.x;
    const dz = pacman.position.z - g.position.z;

    const dist = Math.sqrt(dx*dx + dz*dz);

    if (dist > 0.1) {
      g.position.x += (dx / dist) * 0.02;
      g.position.z += (dz / dist) * 0.02;
    }

    // collision
    if (dist < 0.7) {
      pacman.position.set(0, 0.5, 0);
    }
  });
}
</script>
</body>
</html>
