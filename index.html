<!DOCTYPE html>
<html>
<head>
    <title>Backrooms - Fixed Controls</title>
    <style>
        body { margin: 0; background: #1a1a14; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { background: #e2d192; display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: #d4d4aa;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; cursor: pointer;
        }
        .ui { position: absolute; top: 10px; left: 10px; color: #444; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startGame()">
        <h1>THE BACKROOMS</h1>
        <p>CLICK ANYWHERE TO START</p>
        <p style="font-size: 0.8em;">Use WASD to move</p>
    </div>

    <div class="ui">COORD: <span id="coords">0, 0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

let gameRunning = false;
let player = { x: 30, y: 30 };
let keys = {};
const TILE_SIZE = 80;

// 1. Force Focus Function
function startGame() {
    overlay.style.display = 'none';
    gameRunning = true;
    window.focus(); // Force browser focus to the game window
}

// 2. Wall Generation Logic
function isWall(x, y) {
    if (Math.abs(x) <= 1 && Math.abs(y) <= 1) return false; // Safe start zone
    let val = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return (val - Math.floor(val)) > 0.82; // Walls are 18% of the world
}

// 3. Robust Input Listener
window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
});

function update() {
    if (!gameRunning) return;

    let speed = 5;
    let dx = 0;
    let dy = 0;

    if (keys['w']) dy -= speed;
    if (keys['s']) dy += speed;
    if (keys['a']) dx -= speed;
    if (keys['d']) dx += speed;

    // Check Horizontal Movement
    if (!checkCollision(player.x + dx, player.y)) {
        player.x += dx;
    }
    // Check Vertical Movement
    if (!checkCollision(player.x, player.y + dy)) {
        player.y += dy;
    }
}

function checkCollision(nx, ny) {
    const p = 10; // Player hitbox size
    const corners = [
        {x: nx - p, y: ny - p},
        {x: nx + p, y: ny - p},
        {x: nx - p, y: ny + p},
        {x: nx + p, y: ny + p}
    ];
    for (let c of corners) {
        if (isWall(Math.floor(c.x / TILE_SIZE), Math.floor(c.y / TILE_SIZE))) return true;
    }
    return false;
}

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Clear background
    ctx.fillStyle = "#e2d192";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const offsetX = canvas.width / 2 - player.x;
    const offsetY = canvas.height / 2 - player.y;

    // Render Walls
    const startCol = Math.floor((player.x - canvas.width / 2) / TILE_SIZE);
    const endCol = Math.ceil((player.x + canvas.width / 2) / TILE_SIZE);
    const startRow = Math.floor((player.y - canvas.height / 2) / TILE_SIZE);
    const endRow = Math.ceil((player.y + canvas.height / 2) / TILE_SIZE);

    for (let row = startRow; row <= endRow; row++) {
        for (let col = startCol; col <= endCol; col++) {
            if (isWall(col, row)) {
                ctx.fillStyle = "#bcae76";
                ctx.fillRect(col * TILE_SIZE + offsetX, row * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = "rgba(0,0,0,0.05)";
                ctx.strokeRect(col * TILE_SIZE + offsetX, row * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Draw Player
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 12, 0, Math.PI * 2);
    ctx.fill();

    document.getElementById('coords').innerText = `${Math.floor(player.x / TILE_SIZE)}, ${Math.floor(player.y / TILE_SIZE)}`;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
