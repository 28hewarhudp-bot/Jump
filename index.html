<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Pac-Man First Person</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  #info { position: absolute; color: white; top: 10px; left: 10px; font-family: sans-serif; }
</style>
</head>
<body>
<div id="info">WASD to move | Score: <span id="score">0</span></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene, camera, renderer;
let pacman;
let ghosts = [];
let pellets = [];
let walls = [];
let keys = {};
let score = 0;
let mouthDir = 1;

const size = 1;

// BIGGER MAZE (20x20)
const map = [];
for(let z=0; z<20; z++){
  map[z] = [];
  for(let x=0; x<20; x++){
    if(x===0||z===0||x===19||z===19) map[z][x]=1;
    else map[z][x]=Math.random()<0.18?1:0;
  }
}

init();
animate();

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,5);
  scene.add(light);

  buildMaze();

  // PACMAN (first person)
  pacman = new THREE.Mesh(
    new THREE.SphereGeometry(0.4,16,16),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  pacman.position.set(2,0.4,2);
  scene.add(pacman);

  // FIRST PERSON CAMERA INSIDE PACMAN
  camera.position.set(0,0.4,0);
  pacman.add(camera);

  // GHOSTS (classic colors)
  const colors=[0xff0000,0x00ffff,0xffb8ff];

  for(let i=0;i<3;i++){
    let g = new THREE.Group();

    let body = new THREE.Mesh(
      new THREE.SphereGeometry(0.4,16,16),
      new THREE.MeshBasicMaterial({color:colors[i]})
    );
    body.position.y=0.4;

    g.add(body);
    g.position.set(10+i,0,10);
    g.userData={dir:new THREE.Vector3(1,0,0)};

    ghosts.push(g);
    scene.add(g);
  }

  window.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
  window.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);
  window.addEventListener('resize', onResize);
}

function buildMaze(){
  for(let z=0;z<map.length;z++){
    for(let x=0;x<map[z].length;x++){
      if(map[z][x]===1){
        let wall = new THREE.Mesh(
          new THREE.BoxGeometry(1,1,1),
          new THREE.MeshBasicMaterial({color:0x0044ff})
        );
        wall.position.set(x,0.5,z);
        walls.push(wall);
        scene.add(wall);
      } else {
        let p = new THREE.Mesh(
          new THREE.SphereGeometry(0.12,8,8),
          new THREE.MeshBasicMaterial({color:0xffffff})
        );
        p.position.set(x,0.2,z);
        pellets.push(p);
        scene.add(p);
      }
    }
  }
}

function animate(){
  requestAnimationFrame(animate);

  movePacman();
  moveGhosts();

  renderer.render(scene,camera);
}

function movePacman(){
  let speed=0.08;
  let nx=pacman.position.x;
  let nz=pacman.position.z;

  if(keys['w']) nz-=speed;
  if(keys['s']) nz+=speed;
  if(keys['a']) nx-=speed;
  if(keys['d']) nx+=speed;

  if(!collide(nx,nz)){
    pacman.position.x=nx;
    pacman.position.z=nz;
  }

  // MOUTH ANIMATION
  mouthDir += 0.08;
  pacman.scale.x = 1 + Math.sin(mouthDir)*0.2;

  // EAT PELLETS
  for(let i=0;i<pellets.length;i++){
    let p=pellets[i];
    if(!p) continue;
    if(dist(pacman.position,p.position)<0.6){
      scene.remove(p);
      pellets[i]=null;
      score++;
      document.getElementById("score").innerText=score;
    }
  }
}

function moveGhosts(){
  ghosts.forEach(g=>{
    let dx=pacman.position.x-g.position.x;
    let dz=pacman.position.z-g.position.z;

    let distVal=Math.sqrt(dx*dx+dz*dz);

    let dir=new THREE.Vector3(dx,0,dz).normalize();

    let speed=0.05;

    let nx=g.position.x;
    let nz=g.position.z;

    if(distVal<8){
      nx+=dir.x*speed;
      nz+=dir.z*speed;
    } else {
      let d=g.userData.dir;
      nx+=d.x*speed;
      nz+=d.z*speed;

      if(Math.random()<0.02){
        g.userData.dir=new THREE.Vector3(
          (Math.random()-0.5),0,(Math.random()-0.5)
        ).normalize();
      }
    }

    if(!collide(nx,nz)){
      g.position.x=nx;
      g.position.z=nz;
    } else {
      g.userData.dir=new THREE.Vector3(Math.random()-0.5,0,Math.random()-0.5).normalize();
    }

    if(distVal<0.6){
      pacman.position.set(2,0.4,2);
    }
  });
}

function collide(x,z){
  for(let w of walls){
    if(dist({x,z},w.position)<0.7) return true;
  }
  return false;
}

function dist(a,b){
  return Math.sqrt((a.x-b.x)**2+(a.z-b.z)**2);
}

function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}
</script>
</body>
</html>
