<!DOCTYPE html>
<html>
<head>
    <title>THE VISIBLE MAZE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff3333; text-shadow: 2px 2px black; z-index: 10; pointer-events: none; }
        #hold-still { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 32px; display: none; text-align: center; background: rgba(0,0,0,0.7); padding: 25px; border-radius: 15px; }
        #msg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: red; display: none; align-items: center; justify-content: center; z-index: 20; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>STALKER 1: <span id="s1-status">SEARCHING</span></h2>
        <h2>STALKER 2: <span id="s2-status">SEARCHING</span></h2>
        <p><b>WASD:</b> Move | <b>SHIFT:</b> Sprint | <b>MOUSE:</b> Look</p>
        <p><i>STAY COMPLETELY STILL IF SPOTTED!</i></p>
    </div>
    <div id="hold-still"><h1>FREEZE!</h1><p>REMAIN STILL: <span id="sec">10</span>s</p></div>
    <div id="msg"><h1>CAUGHT</h1></div>

    <script src="https://unpkg.com"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 5, 55);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- BRIGHTER AMBIENT LIGHT ---
        scene.add(new THREE.AmbientLight(0x606060)); // Brighter floor/wall visibility
        const point = new THREE.PointLight(0xffffff, 0.8, 100);
        scene.add(point);

        // --- MAZE CONSTRUCTION ---
        const mazeSize = 30, wallSize = 8;
        const walls = [];
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const wallGeo = new THREE.BoxGeometry(wallSize, 12, wallSize);

        // Grid-based Maze for better visibility
        for(let x=0; x<mazeSize; x++) {
            for(let z=0; z<mazeSize; z++) {
                if(x==0 || x==mazeSize-1 || z==0 || z==mazeSize-1 || (x%4==0 && z%4==0)) {
                    const wall = new THREE.Mesh(wallGeo, wallMat);
                    wall.position.set(x*wallSize - 120, 6, z*wallSize - 120);
                    scene.add(wall);
                    walls.push(wall);
                }
            }
        }
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshStandardMaterial({color: 0x151515})).rotateX(-Math.PI/2));

        // --- BOTH MONSTERS ---
        const loader = new THREE.TextureLoader();
        const m1Tex = loader.load('https://deepai.org');
        const m2Tex = loader.load('https://deepai.org');

        function makeMonster(tex, x, z) {
            const m = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
            m.scale.set(7, 10, 1);
            m.position.set(x, 5, z);
            m.userData = { state: "WANDER", target: new THREE.Vector3(x, 5, z), timer: 0 };
            scene.add(m);
            return m;
        }
        const monsters = [makeMonster(m1Tex, 40, 40), makeMonster(m2Tex, -40, -40)];

        // --- CONTROLS ---
        let yaw = 0, pitch = 0, playerPos = new THREE.Vector3(-100, 1.8, -100);
        const keys = {};

        document.body.addEventListener('click', () => renderer.domElement.requestPointerLock());
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                yaw -= e.movementX*0.002; pitch -= e.movementY*0.002;
                pitch = Math.max(-1.2, Math.min(1.2, pitch));
            }
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];
            const speed = keys['ShiftLeft'] ? 0.35 : 0.18;
            
            if(isMoving) {
                const move = new THREE.Vector3();
                if(keys['KeyW']) move.z -= speed; if(keys['KeyS']) move.z += speed;
                if(keys['KeyA']) move.x -= speed; if(keys['KeyD']) move.x += speed;
                move.applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
                playerPos.add(move);
            }

            camera.position.copy(playerPos);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            point.position.copy(playerPos); // Light stays with you

            let activeFreeze = false;
            monsters.forEach((m, i) => {
                const dist = m.position.distanceTo(playerPos);
                const status = document.getElementById(`s${i+1}-status`);

                if(m.userData.state === "WANDER") {
                    status.innerText = "SEARCHING";
                    if(m.position.distanceTo(m.userData.target) < 4) {
                        m.userData.target.set((Math.random()-0.5)*240, 5, (Math.random()-0.5)*240);
                    }
                    m.position.add(new THREE.Vector3().subVectors(m.userData.target, m.position).normalize().multiplyScalar(0.08));
                    if(dist < 28) { m.userData.state = "CHASE"; m.userData.timer = Date.now(); }
                } 
                else if(m.userData.state === "CHASE") {
                    activeFreeze = true;
                    status.innerText = "SIGHTED!";
                    let elapsed = Math.floor((Date.now() - m.userData.timer)/1000);
                    document.getElementById('sec').innerText = Math.max(0, 10 - elapsed);

                    if(isMoving) { 
                        document.getElementById('msg').style.display='flex';
                        setTimeout(()=>location.reload(), 2000); 
                    }
                    if(elapsed >= 10) { 
                        m.userData.state = "WANDER";
                        m.position.set((Math.random()-0.5)*200, 5, (Math.random()-0.5)*200);
                    }
                }
            });

            document.getElementById('hold-still').style.display = activeFreeze ? 'block' : 'none';
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
